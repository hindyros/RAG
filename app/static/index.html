<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #1b1b1b;
      --surface:    #222222;
      --surface-2:  #2a2a2a;
      --text:       #c5c1b9;
      --text-bright:#dcdad5;
      --muted:      #6e6b65;
      --accent:     #575ECF;
      --accent-dim: rgba(87, 94, 207, 0.12);
      --border:     rgba(255, 255, 255, 0.06);
      --border-mid: rgba(255, 255, 255, 0.10);
      --green:      #4caf82;
      --yellow:     #c9921a;
      --red:        #c05555;
      --ease:       cubic-bezier(0.16, 1, 0.32, 1);
      --font:       -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      background: rgba(27, 27, 27, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }

    #logo {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--text-bright);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #doc-badge {
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 3px 10px;
      letter-spacing: 0.01em;
    }

    #upload-btn {
      font-size: 14px;
      font-weight: 400;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border-mid);
      border-radius: 8px;
      padding: 7px 16px;
      cursor: pointer;
      transition: background 150ms var(--ease), border-color 150ms var(--ease), color 150ms;
      letter-spacing: 0.01em;
    }
    #upload-btn:hover {
      background: var(--surface-2);
      border-color: rgba(255,255,255,0.16);
      color: var(--text-bright);
    }
    #upload-btn:active { transform: scale(0.98); }

    /* ── Messages ─────────────────────────────────────────────────── */
    #messages {
      max-width: 800px;
      margin: 0 auto;
      padding: 80px 28px 100px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Empty state */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 180px);
      gap: 12px;
      color: var(--muted);
      text-align: center;
    }
    #empty-state .empty-title {
      font-size: 22px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    #empty-state .empty-sub {
      font-size: 15px;
      color: var(--muted);
      max-width: 360px;
      line-height: 1.6;
    }

    /* User bubble */
    .msg-user {
      align-self: flex-end;
      max-width: 68%;
      background: var(--accent-dim);
      border: 1px solid rgba(87, 94, 207, 0.22);
      border-radius: 20px 20px 5px 20px;
      padding: 12px 18px;
      color: var(--text-bright);
      font-size: 15px;
      line-height: 1.6;
      word-break: break-word;
    }

    /* Assistant card */
    .msg-assistant {
      align-self: flex-start;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px 20px 20px 20px;
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .answer-text {
      color: var(--text-bright);
      font-size: 15px;
      line-height: 1.75;
    }
    .answer-text strong { color: #e8e5de; font-weight: 600; }
    .answer-text h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-bright);
      margin: 12px 0 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .answer-text ul, .answer-text ol {
      padding-left: 22px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .answer-text li { color: var(--text); }
    .answer-text sup {
      font-size: 10px;
      color: var(--accent);
      font-weight: 600;
      vertical-align: super;
      line-height: 0;
    }
    .answer-text p + p { margin-top: 10px; }

    /* Footer row inside card */
    .card-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      padding-top: 2px;
      border-top: 1px solid var(--border);
    }

    /* Source badge */
    .badge-sourced {
      font-size: 12px;
      color: var(--green);
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .badge-general {
      font-size: 12px;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    /* Divider dot */
    .dot-sep {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--border-mid);
      flex-shrink: 0;
    }

    /* Citations toggle */
    .citations-toggle {
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: color 150ms;
    }
    .citations-toggle:hover { color: var(--text); }
    .citations-toggle .chevron {
      font-size: 10px;
      display: inline-block;
      transition: transform 200ms var(--ease);
    }
    .citations-toggle.open .chevron { transform: rotate(180deg); }

    .citations-body {
      overflow: hidden;
      max-height: 0;
      transition: max-height 300ms var(--ease);
    }
    .citations-body.open { max-height: 2000px; }

    .citation-item {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-top: 1px solid var(--border);
      align-items: baseline;
    }
    .citation-index {
      color: var(--accent);
      font-weight: 600;
      font-size: 12px;
      flex-shrink: 0;
      min-width: 24px;
    }
    .citation-meta { display: flex; flex-direction: column; gap: 3px; }
    .citation-source { color: var(--text-bright); font-size: 13px; font-weight: 500; }
    .citation-score { color: var(--muted); font-size: 12px; }
    .citation-excerpt { color: var(--muted); font-size: 13px; line-height: 1.5; }

    /* Hallucination indicator */
    .hall-toggle {
      font-size: 12px;
      cursor: pointer;
      user-select: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 99px;
      padding: 3px 10px;
      border: 1px solid;
      transition: opacity 150ms;
    }
    .hall-toggle:hover { opacity: 0.75; }
    .hall-toggle:active { transform: scale(0.97); }
    .hall-toggle .chevron {
      font-size: 10px;
      display: inline-block;
      transition: transform 200ms var(--ease);
    }
    .hall-toggle.open .chevron { transform: rotate(180deg); }
    .hall-consistent { color: var(--green);  background: rgba(76,175,130,0.08); border-color: rgba(76,175,130,0.2); }
    .hall-check      { color: var(--yellow); background: rgba(201,146,26,0.08); border-color: rgba(201,146,26,0.2); }
    .hall-flagged    { color: var(--red);    background: rgba(192,85,85,0.08);  border-color: rgba(192,85,85,0.2); }

    .hall-body {
      overflow: hidden;
      max-height: 0;
      transition: max-height 350ms var(--ease);
    }
    .hall-body.open { max-height: 2000px; }

    .hall-sentences {
      font-size: 15px;
      line-height: 1.8;
      padding-top: 10px;
    }
    .sent-span { border-radius: 3px; padding: 1px 3px; cursor: default; }
    .sent-green  { background: rgba(76,175,130,0.14); }
    .sent-yellow { background: rgba(201,146,26,0.16); }
    .sent-red    { background: rgba(192,85,85,0.16); }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(
        90deg,
        var(--surface) 25%,
        rgba(255,255,255,0.05) 50%,
        var(--surface) 75%
      );
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
      height: 16px;
    }
    .skeleton + .skeleton { margin-top: 10px; }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Input bar ────────────────────────────────────────────────── */
    #input-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 14px 28px 20px;
      background: linear-gradient(to top, var(--bg) 70%, transparent);
      z-index: 100;
    }

    #input-inner {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border-mid);
      border-radius: 14px;
      padding: 10px 10px 10px 18px;
      transition: border-color 150ms;
    }
    #input-inner:focus-within {
      border-color: rgba(87, 94, 207, 0.45);
    }

    #question-input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-bright);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.6;
      outline: none;
      resize: none;
      min-height: 24px;
      max-height: 160px;
    }
    #question-input::placeholder { color: var(--muted); }

    #send-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 9px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 150ms, transform 100ms;
    }
    #send-btn:hover:not(:disabled) { opacity: 0.85; }
    #send-btn:active:not(:disabled) { transform: scale(0.93); }
    #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Upload modal ─────────────────────────────────────────────── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.open { display: flex; }

    #modal-card {
      background: var(--surface);
      border: 1px solid var(--border-mid);
      border-radius: 16px;
      padding: 32px;
      width: min(480px, 92vw);
      display: flex;
      flex-direction: column;
      gap: 20px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    #modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #modal-title {
      font-size: 17px;
      font-weight: 500;
      color: var(--text-bright);
      letter-spacing: -0.01em;
    }
    #modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 150ms, background 150ms;
    }
    #modal-close:hover { color: var(--text); background: var(--surface-2); }

    #drop-zone {
      border: 1.5px dashed var(--border-mid);
      border-radius: 12px;
      padding: 44px 24px;
      text-align: center;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 150ms var(--ease), background 150ms;
      font-size: 14px;
      line-height: 1.6;
    }
    #drop-zone .dz-icon {
      font-size: 28px;
      display: block;
      margin-bottom: 10px;
      opacity: 0.5;
    }
    #drop-zone .dz-hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      opacity: 0.7;
    }
    #drop-zone:hover,
    #drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--text);
    }

    #file-input { display: none; }

    #upload-status {
      font-size: 13px;
      color: var(--muted);
      min-height: 18px;
      text-align: center;
    }
    #upload-status.success { color: var(--green); }
    #upload-status.error   { color: var(--red); }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────── -->
<header id="header">
  <div id="logo">
    RAG
    <span id="doc-badge">0 docs</span>
  </div>
  <button id="upload-btn" onclick="openModal()">Upload ⊕</button>
</header>

<!-- ── Messages ────────────────────────────────────────────────────── -->
<div id="messages">
  <div id="empty-state">
    <div class="empty-title">Ask anything</div>
    <div class="empty-sub">Upload documents first, then ask questions about their content.</div>
  </div>
</div>

<!-- ── Input bar ───────────────────────────────────────────────────── -->
<div id="input-bar">
  <div id="input-inner">
    <textarea
      id="question-input"
      rows="1"
      placeholder="Ask a question…"
      onkeydown="handleKey(event)"
    ></textarea>
    <button id="send-btn" onclick="sendQuery()" title="Send">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 8L13 8M13 8L9 4M13 8L9 12" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</div>

<!-- ── Upload modal ─────────────────────────────────────────────────── -->
<div id="modal-overlay" role="dialog" aria-modal="true">
  <div id="modal-card">
    <div id="modal-header">
      <div id="modal-title">Upload documents</div>
      <button id="modal-close" onclick="closeModal()">×</button>
    </div>
    <div
      id="drop-zone"
      onclick="document.getElementById('file-input').click()"
      ondragover="onDragOver(event)"
      ondragleave="onDragLeave(event)"
      ondrop="onDrop(event)"
    >
      <span class="dz-icon">⊕</span>
      Drag &amp; drop PDF files here
      <div class="dz-hint">or click to select — PDF only, max 50 MB each</div>
    </div>
    <input id="file-input" type="file" multiple accept=".pdf" onchange="onFileSelect(event)" />
    <div id="upload-status"></div>
  </div>
</div>

<script>
  // ── State ─────────────────────────────────────────────────────────
  const state = { documentCount: 0, isLoading: false };

  // ── Init ──────────────────────────────────────────────────────────
  async function init() {
    await refreshHealth();

    const ta = document.getElementById('question-input');
    ta.addEventListener('input', function () {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 160) + 'px';
    });
  }

  async function refreshHealth() {
    try {
      const r = await fetch('/health');
      if (!r.ok) return;
      const d = await r.json();
      state.documentCount = d.total_documents ?? 0;
      document.getElementById('doc-badge').textContent =
        state.documentCount + (state.documentCount === 1 ? ' doc' : ' docs');
    } catch (_) {}
  }

  // ── Query ──────────────────────────────────────────────────────────
  async function sendQuery() {
    const input = document.getElementById('question-input');
    const question = input.value.trim();
    if (!question || state.isLoading) return;

    state.isLoading = true;
    document.getElementById('send-btn').disabled = true;

    // Remove empty state
    const es = document.getElementById('empty-state');
    if (es) es.remove();

    input.value = '';
    input.style.height = 'auto';

    appendUserMessage(question);
    const placeholder = appendLoadingMessage();

    try {
      const r = await fetch('/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question }),
      });
      const data = await r.json();
      placeholder.replaceWith(buildAssistantCard(data));
    } catch (_) {
      placeholder.replaceWith(buildAssistantCard({
        answer: 'Something went wrong. Please try again.',
        grounded: false, citations: [], hallucination: null,
      }));
    } finally {
      state.isLoading = false;
      document.getElementById('send-btn').disabled = false;
      scrollToBottom();
    }
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); }
  }

  // ── Message builders ───────────────────────────────────────────────
  function appendUserMessage(text) {
    const el = document.createElement('div');
    el.className = 'msg-user';
    el.textContent = text;
    document.getElementById('messages').appendChild(el);
    scrollToBottom();
    return el;
  }

  function appendLoadingMessage() {
    const card = document.createElement('div');
    card.className = 'msg-assistant';
    [100, 80, 55].forEach(w => {
      const sk = document.createElement('div');
      sk.className = 'skeleton';
      sk.style.width = w + '%';
      card.appendChild(sk);
    });
    document.getElementById('messages').appendChild(card);
    scrollToBottom();
    return card;
  }

  function buildAssistantCard(data) {
    const card = document.createElement('div');
    card.className = 'msg-assistant';

    // Answer
    const answerEl = document.createElement('div');
    answerEl.className = 'answer-text';
    answerEl.innerHTML = renderMarkdown(data.answer ?? '');
    card.appendChild(answerEl);

    // Footer row
    const footer = document.createElement('div');
    footer.className = 'card-footer';

    // Source badge
    const badge = document.createElement('span');
    if (data.grounded) {
      badge.className = 'badge-sourced';
      badge.textContent = '● sourced';
    } else {
      badge.className = 'badge-general';
      badge.textContent = '◌ general';
    }
    footer.appendChild(badge);

    // Citations
    if (data.citations && data.citations.length > 0) {
      footer.appendChild(makeDot());
      footer.appendChild(buildCitationsToggle(data.citations));
    }

    // Hallucination pill
    if (data.grounded && data.hallucination) {
      footer.appendChild(makeDot());
      const pill = buildHallPill(data.hallucination);
      footer.appendChild(pill);
    }

    card.appendChild(footer);

    // Expandable sections (appended after footer)
    if (data.citations && data.citations.length > 0) {
      card.appendChild(buildCitationsBody(data.citations));
    }
    if (data.grounded && data.hallucination) {
      card.appendChild(buildHallBody(data.hallucination));
    }

    // Wire toggles after DOM is built
    setTimeout(() => wireToggles(card), 0);

    return card;
  }

  function makeDot() {
    const d = document.createElement('span');
    d.className = 'dot-sep';
    return d;
  }

  // ── Citations ──────────────────────────────────────────────────────
  function buildCitationsToggle(citations) {
    const toggle = document.createElement('span');
    toggle.className = 'citations-toggle';
    toggle.dataset.target = 'citations';
    toggle.innerHTML =
      citations.length + ' source' + (citations.length !== 1 ? 's' : '') +
      ' <span class="chevron">▾</span>';
    return toggle;
  }

  function buildCitationsBody(citations) {
    const body = document.createElement('div');
    body.className = 'citations-body';
    body.dataset.role = 'citations';

    for (const c of citations) {
      const item = document.createElement('div');
      item.className = 'citation-item';

      const idx = document.createElement('span');
      idx.className = 'citation-index';
      idx.textContent = '[' + c.index + ']';

      const meta = document.createElement('div');
      meta.className = 'citation-meta';

      const src = document.createElement('span');
      src.className = 'citation-source';
      src.textContent = c.source_file + (c.page_number ? '  ·  p.' + c.page_number : '');

      const score = document.createElement('span');
      score.className = 'citation-score';
      score.textContent = 'similarity ' + c.similarity_score.toFixed(3);

      const excerpt = document.createElement('span');
      excerpt.className = 'citation-excerpt';
      excerpt.textContent = c.excerpt;

      meta.appendChild(src);
      meta.appendChild(score);
      meta.appendChild(excerpt);
      item.appendChild(idx);
      item.appendChild(meta);
      body.appendChild(item);
    }

    return body;
  }

  // ── Hallucination ──────────────────────────────────────────────────
  function hallCls(score) {
    return score >= 0.7 ? 'hall-consistent' : score >= 0.4 ? 'hall-check' : 'hall-flagged';
  }
  function hallLabel(score) {
    return score >= 0.7 ? 'Consistent' : score >= 0.4 ? 'Check' : 'Flagged';
  }

  function buildHallPill(h) {
    const pill = document.createElement('button');
    pill.className = 'hall-toggle ' + hallCls(h.overall_score);
    pill.dataset.target = 'hall';
    pill.innerHTML =
      hallLabel(h.overall_score) + ' ' + h.overall_score.toFixed(2) +
      ' <span class="chevron">▾</span>';
    return pill;
  }

  function buildHallBody(h) {
    const body = document.createElement('div');
    body.className = 'hall-body';
    body.dataset.role = 'hall';

    const inner = document.createElement('div');
    inner.className = 'hall-sentences';

    for (const ss of h.sentences) {
      const span = document.createElement('span');
      span.className = 'sent-span ' + (ss.score >= 0.7 ? 'sent-green' : ss.score >= 0.4 ? 'sent-yellow' : 'sent-red');
      span.title = 'Score: ' + ss.score.toFixed(2);
      span.textContent = ss.sentence + ' ';
      inner.appendChild(span);
    }

    body.appendChild(inner);
    return body;
  }

  function wireToggles(card) {
    card.querySelectorAll('[data-target]').forEach(toggle => {
      const role = toggle.dataset.target;
      const body = card.querySelector('[data-role="' + role + '"]');
      if (!body) return;
      toggle.addEventListener('click', () => {
        const open = body.classList.toggle('open');
        toggle.classList.toggle('open', open);
      });
    });
  }

  // ── Markdown ───────────────────────────────────────────────────────
  function renderMarkdown(raw) {
    let html = raw
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');

    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\[(\d+)\]/g, '<sup>[$1]</sup>');
    html = html.replace(/^[*\-] (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>.*<\/li>\n?)+/g, m => '<ul>' + m + '</ul>');
    html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

    const paras = html.split(/\n{2,}/);
    html = paras.map(p => {
      p = p.trim();
      if (!p) return '';
      if (/^<(h3|ul|ol|li)/.test(p)) return p;
      return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
    }).filter(Boolean).join('');

    return html;
  }

  // ── Upload ─────────────────────────────────────────────────────────
  async function uploadFiles(files) {
    if (!files || !files.length) return;
    setUploadStatus('Uploading…', '');

    const fd = new FormData();
    for (const f of files) fd.append('files', f);

    try {
      const r = await fetch('/ingest', { method: 'POST', body: fd });
      const d = await r.json();
      if (r.ok) {
        setUploadStatus(
          '✓ ' + d.chunks_added + ' chunks added from ' + d.files_processed + ' file(s)',
          'success'
        );
        await refreshHealth();
      } else {
        setUploadStatus(d.detail ?? 'Upload failed.', 'error');
      }
    } catch (_) {
      setUploadStatus('Network error — is the server running?', 'error');
    }
  }

  function setUploadStatus(msg, cls) {
    const el = document.getElementById('upload-status');
    el.textContent = msg;
    el.className = cls;
  }

  // ── Modal ──────────────────────────────────────────────────────────
  function openModal()  { document.getElementById('modal-overlay').classList.add('open'); setUploadStatus('', ''); }
  function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

  document.getElementById('modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  function onDragOver(e)  { e.preventDefault(); document.getElementById('drop-zone').classList.add('drag-over'); }
  function onDragLeave()  { document.getElementById('drop-zone').classList.remove('drag-over'); }
  function onDrop(e)      { e.preventDefault(); document.getElementById('drop-zone').classList.remove('drag-over'); uploadFiles(e.dataTransfer.files); }
  function onFileSelect(e){ uploadFiles(e.target.files); e.target.value = ''; }

  // ── Scroll ─────────────────────────────────────────────────────────
  function scrollToBottom() {
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }

  init();
</script>
</body>

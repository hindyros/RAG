<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StackAI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* ── Palantir Blueprint dark-mode palette ──────────────────── */
      --bg:          #1C2127;   /* DARK_GRAY1 */
      --surface:     #252A31;   /* DARK_GRAY2 */
      --surface-2:   #2F343C;   /* DARK_GRAY3 */
      --surface-3:   #383E47;   /* DARK_GRAY4 */
      --surface-4:   #404854;   /* DARK_GRAY5 */

      --text:        #F6F7F9;   /* LIGHT_GRAY5 — primary text */
      --text-2:      #E5E8EB;   /* LIGHT_GRAY3 */
      --text-muted:  #8F99A8;   /* GRAY3 */
      --text-dim:    #5F6B7C;   /* GRAY1 */

      --blue:        #2D72D2;   /* BLUE3 — primary intent */
      --blue-dim:    rgba(45, 114, 210, 0.18);
      --blue-border: rgba(45, 114, 210, 0.45);

      --green:       #238551;   /* GREEN3 */
      --green-bg:    rgba(35, 133, 81, 0.15);
      --orange:      #C87619;   /* ORANGE3 */
      --orange-bg:   rgba(200, 118, 25, 0.15);
      --red:         #CD4246;   /* RED3 */
      --red-bg:      rgba(205, 66, 70, 0.15);

      --border:      #383E47;   /* DARK_GRAY4 */
      --border-light:#2F343C;   /* DARK_GRAY3 */

      --radius:      2px;
      --font:        -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Helvetica Neue', Arial, sans-serif;
      --mono:        'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }

    #logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #logo img {
      height: 28px;
      width: auto;
      display: block;
    }

    #doc-badge {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: var(--text-muted);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 2px 10px;
      cursor: pointer;
      text-transform: none;
      transition: color 100ms, border-color 100ms;
    }
    #doc-badge:hover { color: var(--text); border-color: var(--surface-4); }

    .header-actions { display: flex; gap: 6px; align-items: center; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 32px;
      padding: 0 14px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 400;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 100ms, box-shadow 100ms;
      border: none;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--surface-2); color: var(--text); border-color: var(--surface-4); }
    .btn-ghost:active { background: var(--surface-3); }

    .btn-primary {
      background: var(--blue);
      color: #fff;
      border: 1px solid transparent;
    }
    .btn-primary:hover { background: #215DB0; }
    .btn-primary:active { background: #184A90; }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Messages ─────────────────────────────────────────────────── */
    #messages {
      max-width: 860px;
      margin: 0 auto;
      padding: 64px 24px 96px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 160px);
      gap: 10px;
      text-align: center;
    }
    .empty-title {
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .empty-sub {
      font-size: 15px;
      color: var(--text-muted);
      max-width: 340px;
      line-height: 1.55;
    }

    /* User message */
    .msg-user {
      align-self: flex-end;
      max-width: 62%;
      background: var(--surface-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
      word-break: break-word;
    }

    /* Assistant card */
    .msg-assistant {
      align-self: flex-start;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Answer text */
    .answer-text {
      color: var(--text);
      font-size: 15px;
      line-height: 1.8;
    }
    .answer-text strong { color: var(--text); font-weight: 600; }
    .answer-text h3 {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 12px 0 4px;
    }
    .answer-text ul, .answer-text ol {
      padding-left: 18px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .answer-text li { color: var(--text-2); }
    .answer-text sup {
      font-size: 10px;
      color: var(--blue);
      font-weight: 600;
      vertical-align: super;
      line-height: 0;
    }
    .answer-text p + p { margin-top: 8px; }

    /* Footer row */
    .card-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding-top: 8px;
      border-top: 1px solid var(--border-light);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 22px;
      padding: 0 9px;
      border-radius: 2px;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.02em;
      border: 1px solid;
      cursor: default;
    }
    .tag-green  { color: #3dae7a; background: var(--green-bg);  border-color: rgba(35,133,81,0.3); }
    .tag-gray   { color: var(--text-muted); background: var(--surface-2); border-color: var(--border); }

    .dot-sep { width: 1px; height: 12px; background: var(--border); flex-shrink: 0; }

    /* Expandable toggle button */
    .toggle-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      height: 22px;
      padding: 0 9px;
      border-radius: 2px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      font-family: var(--font);
      cursor: pointer;
      transition: background 100ms, color 100ms, border-color 100ms;
    }
    .toggle-btn:hover { background: var(--surface-2); color: var(--text); border-color: var(--surface-4); }
    .toggle-btn .chevron { font-size: 8px; transition: transform 150ms; }
    .toggle-btn.open .chevron { transform: rotate(180deg); }

    /* Hallucination pill */
    .hall-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 22px;
      padding: 0 10px;
      border-radius: 2px;
      font-size: 12px;
      font-family: var(--font);
      font-weight: 500;
      letter-spacing: 0.02em;
      cursor: pointer;
      border: 1px solid;
      transition: opacity 100ms;
    }
    .hall-btn:hover { opacity: 0.8; }
    .hall-btn .chevron { font-size: 8px; transition: transform 150ms; }
    .hall-btn.open .chevron { transform: rotate(180deg); }

    .hall-green  { color: #3dae7a; background: var(--green-bg);  border-color: rgba(35,133,81,0.3); }
    .hall-orange { color: #e8921f; background: var(--orange-bg); border-color: rgba(200,118,25,0.3); }
    .hall-red    { color: #e36a6e; background: var(--red-bg);    border-color: rgba(205,66,70,0.3); }

    /* Collapsible body */
    .expand-body {
      overflow: hidden;
      max-height: 0;
      transition: max-height 250ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .expand-body.open { max-height: 2000px; }

    /* Citations */
    .citation-item {
      display: flex;
      gap: 10px;
      padding: 8px 0;
      border-top: 1px solid var(--border-light);
      align-items: flex-start;
    }
    .citation-index {
      color: var(--blue);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
      min-width: 26px;
      margin-top: 1px;
    }
    .citation-meta { display: flex; flex-direction: column; gap: 2px; }
    .citation-source { color: var(--text); font-size: 14px; font-weight: 500; }
    .citation-relevance {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--mono);
    }
    .citation-excerpt { color: var(--text-muted); font-size: 13px; line-height: 1.5; margin-top: 2px; }

    /* Grounding sentence view */
    .hall-legend {
      font-size: 12px;
      color: var(--text-muted);
      padding: 8px 0 4px;
      border-top: 1px solid var(--border-light);
      margin-top: 4px;
      letter-spacing: 0.01em;
    }
    .hall-sentences { font-size: 15px; line-height: 1.85; padding-top: 4px; }
    .sent-span { border-radius: 1px; padding: 1px 2px; cursor: default; }
    .sent-green  { background: rgba(35,133,81,0.18); }
    .sent-orange { background: rgba(200,118,25,0.18); }
    .sent-red    { background: rgba(205,66,70,0.18); }

    /* ── ASCII loading ─────────────────────────────────────────── */
    .msg-loading {
      align-self: center;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0;
    }

    .ascii-frame {
      font-family: var(--mono);
      font-size: 9.5px;
      line-height: 1.3;
      color: var(--blue);
      white-space: pre;
      opacity: 0.82;
      user-select: none;
      text-align: left;
    }
    .ascii-frame span {
      opacity: 0;
      animation: charReveal 0.03s forwards;
    }
    @keyframes charReveal {
      to { opacity: 1; }
    }

    .ascii-status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      justify-content: center;
    }
    .ascii-status .pulse {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--blue);
      animation: blink 1s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes blink {
      0%, 100% { opacity: 0.2; }
      50%       { opacity: 1; }
    }

    /* ── Input bar ─────────────────────────────────────────────── */
    #input-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 12px 24px 18px;
      background: linear-gradient(to top, var(--bg) 60%, transparent);
      z-index: 100;
    }

    #input-inner {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 8px 8px 14px;
      transition: border-color 100ms, box-shadow 100ms;
    }
    #input-inner:focus-within {
      border-color: var(--blue-border);
      box-shadow: 0 0 0 2px var(--blue-dim);
    }

    #question-input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.5;
      outline: none;
      resize: none;
      min-height: 22px;
      max-height: 160px;
    }
    #question-input::placeholder { color: var(--text-dim); }

    #send-btn {
      height: 32px;
      width: 32px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: var(--blue);
      border: 1px solid transparent;
      border-radius: var(--radius);
      color: #fff;
      cursor: pointer;
      transition: background 100ms;
    }
    #send-btn:hover:not(:disabled) { background: #215DB0; }
    #send-btn:active:not(:disabled) { background: #184A90; }
    #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Modals ─────────────────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px 24px;
      width: min(500px, 92vw);
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      max-height: 85vh;
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .modal-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.01em;
    }
    .modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      line-height: 1;
      padding: 2px 5px;
      border-radius: 2px;
      transition: color 100ms, background 100ms;
    }
    .modal-close:hover { color: var(--text); background: var(--surface-2); }

    /* Upload */
    #drop-zone {
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 24px;
      text-align: center;
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color 100ms, background 100ms;
      font-size: 14px;
      line-height: 1.55;
    }
    #drop-zone .dz-icon { font-size: 22px; display: block; margin-bottom: 10px; opacity: 0.5; }
    #drop-zone .dz-hint { font-size: 12px; color: var(--text-dim); margin-top: 6px; }
    #drop-zone:hover, #drop-zone.drag-over {
      border-color: var(--blue-border);
      background: var(--blue-dim);
      color: var(--text);
    }
    #file-input { display: none; }

    #upload-status { font-size: 13px; color: var(--text-muted); min-height: 18px; text-align: center; font-family: var(--mono); }
    #upload-status.success { color: #3dae7a; }
    #upload-status.error   { color: #e36a6e; }

    .modal-actions { display: flex; gap: 6px; justify-content: flex-end; }
    .modal-actions.hidden { display: none; }

    /* Documents */
    #docs-modal .modal-card { width: min(540px, 92vw); }
    #docs-list { overflow-y: auto; flex: 1; display: flex; flex-direction: column; }

    .doc-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 2px;
      transition: background 100ms;
      border-bottom: 1px solid var(--border-light);
    }
    .doc-item:last-child { border-bottom: none; }
    .doc-item:hover { background: var(--surface-2); }

    .doc-icon {
      width: 28px; height: 28px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 2px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; flex-shrink: 0;
    }
    .doc-info { flex: 1; min-width: 0; }
    .doc-name {
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .doc-meta {
      color: var(--text-muted);
      font-size: 12px;
      font-family: var(--mono);
      margin-top: 1px;
    }

    .doc-delete {
      background: none;
      border: 1px solid transparent;
      color: var(--text-dim);
      border-radius: 2px;
      padding: 4px 10px;
      font-size: 12px;
      font-family: var(--font);
      cursor: pointer;
      flex-shrink: 0;
      transition: color 100ms, border-color 100ms, background 100ms;
    }
    .doc-delete:hover { color: var(--red); border-color: rgba(205,66,70,0.4); background: var(--red-bg); }
    .doc-delete:disabled { opacity: 0.35; cursor: not-allowed; }

    .docs-empty {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      padding: 32px 0;
    }
    #docs-error { font-size: 13px; color: var(--red); min-height: 16px; font-family: var(--mono); }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────── -->
<header id="header">
  <div id="logo">
    <img src="/logo.avif" alt="StackAI" />
    <span id="doc-badge" onclick="openDocsModal()" title="View documents">0 docs</span>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="openDocsModal()">Documents</button>
    <button class="btn btn-ghost" onclick="openUploadModal()">Upload</button>
  </div>
</header>

<!-- ── Messages ────────────────────────────────────────────────────── -->
<div id="messages">
  <div id="empty-state">
    <div class="empty-title">Ask anything</div>
    <div class="empty-sub">Upload your documents, then ask questions about them.</div>
  </div>
</div>

<!-- ── Input bar ───────────────────────────────────────────────────── -->
<div id="input-bar">
  <div id="input-inner">
    <textarea id="question-input" rows="1" placeholder="Ask a question about your documents…" onkeydown="handleKey(event)"></textarea>
    <button id="send-btn" onclick="sendQuery()" title="Send (Enter)">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
        <path d="M3 8H13M13 8L9 4M13 8L9 12" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</div>

<!-- ── Upload modal ─────────────────────────────────────────────────── -->
<div id="upload-modal" class="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal-card">
    <div class="modal-header">
      <div class="modal-title">Upload documents</div>
      <button class="modal-close" onclick="closeUploadModal()">×</button>
    </div>
    <div id="drop-zone" onclick="document.getElementById('file-input').click()" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
      <span class="dz-icon">⊕</span>
      Drag &amp; drop PDF files here
      <div class="dz-hint">or click to select — PDF only, max 50 MB</div>
    </div>
    <input id="file-input" type="file" multiple accept=".pdf" onchange="onFileSelect(event)" />
    <div id="upload-status"></div>
    <div class="modal-actions hidden" id="upload-actions">
      <button class="btn btn-ghost" onclick="resetUploadModal()">Upload another</button>
      <button class="btn btn-primary" onclick="closeUploadModal()">Done</button>
    </div>
  </div>
</div>

<!-- ── Documents modal ───────────────────────────────────────────────── -->
<div id="docs-modal" class="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal-card">
    <div class="modal-header">
      <div class="modal-title">Documents</div>
      <button class="modal-close" onclick="closeDocsModal()">×</button>
    </div>
    <div id="docs-error"></div>
    <div id="docs-list"><div class="docs-empty">Loading…</div></div>
  </div>
</div>

<script>
// ── ASCII logo ─────────────────────────────────────────────────────
const ASCII_LOGO = [
  '                       .++.                       ',
  '                    .#@@@@@@#+                    ',
  '                 +#@@@@@@@@@@@@#+                 ',
  '               +@@@@@@@@@@@@@@@@@@+               ',
  '               +@@@@@@@@@@@@@@#+.@#               ',
  '               +@@@@@@@@@@@#+    @#               ',
  '               +@@@@@@@@@#       @#               ',
  '               +@@@@@@@@@+       @#               ',
  '             .+@@@@@@@@@@+      .@@+.             ',
  '          .#@@@@@@@@@@@@@+   +#@@@@@@@#+          ',
  '       +#@@@@@@@@@@@@@@@@#+#@@@@@@@@@@@@@#+       ',
  '      .@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@+      ',
  '      .@@@@@@@@@@@@@#+. #@@@@@@@@@@@@@#+  @+      ',
  '      .@@@@@@@@@@#+     #@@@@@@@@@@#.     @+      ',
  '      .@@@@@@@@@#       #@@@@@@@@@+       @+      ',
  '      .@@@@@@@@@#       #@@@@@@@@@+       @+      ',
  '       #@@@@@@@@#     .#@@@@@@@@@@+     +#@.      ',
  '        .+@@@@@@#  +#@#+  .#@@@@@@. .+#@#.        ',
  '           .+#@@@@@#+        .+@@@@@#+.           ',
  '               .+.              .++.              ',
];

// ── State ──────────────────────────────────────────────────────────
const state = { documentCount: 0, isLoading: false };

async function init() {
  await refreshHealth();
  const ta = document.getElementById('question-input');
  ta.addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 140) + 'px';
  });
}

async function refreshHealth() {
  try {
    const r = await fetch('/health');
    if (!r.ok) return;
    const d = await r.json();
    state.documentCount = d.total_documents ?? 0;
    document.getElementById('doc-badge').textContent =
      state.documentCount + (state.documentCount === 1 ? ' doc' : ' docs');
  } catch (_) {}
}

// ── Query ───────────────────────────────────────────────────────────
async function sendQuery() {
  const input = document.getElementById('question-input');
  const question = input.value.trim();
  if (!question || state.isLoading) return;

  state.isLoading = true;
  document.getElementById('send-btn').disabled = true;

  const es = document.getElementById('empty-state');
  if (es) es.remove();

  input.value = '';
  input.style.height = 'auto';

  appendUserMessage(question);
  const placeholder = appendAsciiLoading();

  try {
    const r = await fetch('/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question }),
    });
    const data = await r.json();
    placeholder.replaceWith(buildAssistantCard(data));
  } catch (_) {
    placeholder.replaceWith(buildAssistantCard({
      answer: 'Request failed. Please try again.',
      grounded: false, citations: [], hallucination: null,
    }));
  } finally {
    state.isLoading = false;
    document.getElementById('send-btn').disabled = false;
    scrollToBottom();
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); }
}

// ── ASCII loading ──────────────────────────────────────────────────
function appendAsciiLoading() {
  const wrap = document.createElement('div');
  wrap.className = 'msg-loading';

  const frame = document.createElement('div');
  frame.className = 'ascii-frame';

  let delay = 0;
  ASCII_LOGO.forEach(line => {
    for (let i = 0; i < line.length; i++) {
      const s = document.createElement('span');
      s.textContent = line[i];
      s.style.animationDelay = delay + 'ms';
      delay += 1.0;
      frame.appendChild(s);
    }
    frame.appendChild(document.createTextNode('\n'));
  });

  const status = document.createElement('div');
  status.className = 'ascii-status';
  status.innerHTML = '<div class="pulse"></div>PROCESSING QUERY';

  wrap.appendChild(frame);
  wrap.appendChild(status);
  document.getElementById('messages').appendChild(wrap);
  scrollToBottom();
  return wrap;
}

// ── Messages ────────────────────────────────────────────────────────
function appendUserMessage(text) {
  const el = document.createElement('div');
  el.className = 'msg-user';
  el.textContent = text;
  document.getElementById('messages').appendChild(el);
  scrollToBottom();
}

function buildAssistantCard(data) {
  const card = document.createElement('div');
  card.className = 'msg-assistant';

  // Answer
  const answerEl = document.createElement('div');
  answerEl.className = 'answer-text';
  answerEl.innerHTML = renderMarkdown(data.answer ?? '');
  card.appendChild(answerEl);

  // Footer
  const footer = document.createElement('div');
  footer.className = 'card-footer';

  // Source tag
  const srcTag = document.createElement('span');
  srcTag.className = data.grounded ? 'tag tag-green' : 'tag tag-gray';
  srcTag.textContent = data.grounded ? '● SOURCED' : '◌ GENERAL';
  footer.appendChild(srcTag);

  // Citations toggle
  if (data.citations && data.citations.length > 0) {
    footer.appendChild(makeSep());
    footer.appendChild(makeCitationsToggle(data.citations));
  }

  // Grounding score
  if (data.grounded && data.hallucination) {
    footer.appendChild(makeSep());
    footer.appendChild(makeHallPill(data.hallucination));
  }

  card.appendChild(footer);

  // Expandable bodies
  if (data.citations && data.citations.length > 0) {
    card.appendChild(buildCitationsBody(data.citations));
  }
  if (data.grounded && data.hallucination) {
    card.appendChild(buildHallBody(data.hallucination));
  }

  setTimeout(() => wireToggles(card), 0);
  return card;
}

function makeSep() {
  const d = document.createElement('span');
  d.className = 'dot-sep';
  return d;
}

// ── Citations ────────────────────────────────────────────────────────
function makeCitationsToggle(citations) {
  const btn = document.createElement('button');
  btn.className = 'toggle-btn';
  btn.dataset.target = 'citations';
  btn.innerHTML = citations.length + ' source' + (citations.length !== 1 ? 's' : '') +
    ' <span class="chevron">▾</span>';
  return btn;
}

function buildCitationsBody(citations) {
  const body = document.createElement('div');
  body.className = 'expand-body';
  body.dataset.role = 'citations';
  for (const c of citations) {
    const item = document.createElement('div');
    item.className = 'citation-item';

    const idx = document.createElement('span');
    idx.className = 'citation-index';
    idx.textContent = '[' + c.index + ']';

    const meta = document.createElement('div');
    meta.className = 'citation-meta';

    const src = document.createElement('span');
    src.className = 'citation-source';
    src.textContent = c.source_file + (c.page_number ? '  ·  p.' + c.page_number : '');

    const rel = document.createElement('span');
    rel.className = 'citation-relevance';
    rel.textContent = 'relevance: ' + Math.round(c.similarity_score * 100) + '%';

    const exc = document.createElement('span');
    exc.className = 'citation-excerpt';
    exc.textContent = c.excerpt;

    meta.append(src, rel, exc);
    item.append(idx, meta);
    body.appendChild(item);
  }
  return body;
}

// ── Grounding score ───────────────────────────────────────────────
function hallCls(s)     { return s >= 0.7 ? 'hall-green' : s >= 0.4 ? 'hall-orange' : 'hall-red'; }
function hallVerdict(s) {
  const pct = Math.round(s * 100) + '%';
  return s >= 0.7 ? 'Grounded ' + pct : s >= 0.4 ? 'Uncertain ' + pct : 'Unsupported ' + pct;
}

function makeHallPill(h) {
  const btn = document.createElement('button');
  btn.className = 'hall-btn ' + hallCls(h.overall_score);
  btn.dataset.target = 'hall';
  btn.title = 'Per-sentence grounding score — how well the answer is supported by your documents';
  btn.innerHTML = hallVerdict(h.overall_score) + ' <span class="chevron">▾</span>';
  return btn;
}

function buildHallBody(h) {
  const body = document.createElement('div');
  body.className = 'expand-body';
  body.dataset.role = 'hall';

  const legend = document.createElement('div');
  legend.className = 'hall-legend';
  legend.textContent = 'Per-sentence grounding — highlight indicates how well each sentence is supported by your documents:';
  body.appendChild(legend);

  const inner = document.createElement('div');
  inner.className = 'hall-sentences';
  for (const ss of h.sentences) {
    const span = document.createElement('span');
    span.className = 'sent-span ' + (ss.score >= 0.7 ? 'sent-green' : ss.score >= 0.4 ? 'sent-orange' : 'sent-red');
    span.title = Math.round(ss.score * 100) + '% supported by sources';
    span.textContent = ss.sentence + ' ';
    inner.appendChild(span);
  }
  body.appendChild(inner);
  return body;
}

function wireToggles(card) {
  card.querySelectorAll('[data-target]').forEach(toggle => {
    const body = card.querySelector('[data-role="' + toggle.dataset.target + '"]');
    if (!body) return;
    toggle.addEventListener('click', () => {
      const open = body.classList.toggle('open');
      toggle.classList.toggle('open', open);
    });
  });
}

// ── Markdown ──────────────────────────────────────────────────────────
function renderMarkdown(raw) {
  let h = raw.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm, '<h3>$1</h3>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\[(\d+)\]/g, '<sup>[$1]</sup>');
  h = h.replace(/^[*\-] (.+)$/gm, '<li>$1</li>');
  h = h.replace(/(<li>.*<\/li>\n?)+/g, m => '<ul>' + m + '</ul>');
  h = h.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  return h.split(/\n{2,}/).map(p => {
    p = p.trim();
    if (!p || /^<(h3|ul|ol|li)/.test(p)) return p;
    return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
  }).filter(Boolean).join('');
}

// ── Upload ─────────────────────────────────────────────────────────
async function uploadFiles(files) {
  if (!files || !files.length) return;
  setUploadStatus('Uploading…', '');
  document.getElementById('upload-actions').classList.add('hidden');

  const fd = new FormData();
  for (const f of files) fd.append('files', f);

  try {
    const r = await fetch('/ingest', { method: 'POST', body: fd });
    const d = await r.json();
    if (r.ok) {
      setUploadStatus('✓ ' + d.chunks_added + ' chunks added from ' + d.files_processed + ' file(s)', 'success');
      document.getElementById('drop-zone').style.display = 'none';
      document.getElementById('upload-actions').classList.remove('hidden');
      await refreshHealth();
    } else {
      setUploadStatus(d.detail ?? 'Upload failed.', 'error');
    }
  } catch (_) {
    setUploadStatus('Network error.', 'error');
  }
}

function setUploadStatus(msg, cls) {
  const el = document.getElementById('upload-status');
  el.textContent = msg;
  el.className = cls;
}

function openUploadModal()  { resetUploadModal(); document.getElementById('upload-modal').classList.add('open'); }
function closeUploadModal() { document.getElementById('upload-modal').classList.remove('open'); }
function resetUploadModal() {
  setUploadStatus('', '');
  document.getElementById('drop-zone').style.display = '';
  document.getElementById('upload-actions').classList.add('hidden');
  document.getElementById('file-input').value = '';
}

document.getElementById('upload-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeUploadModal(); });
function onDragOver(e)   { e.preventDefault(); document.getElementById('drop-zone').classList.add('drag-over'); }
function onDragLeave()   { document.getElementById('drop-zone').classList.remove('drag-over'); }
function onDrop(e)       { e.preventDefault(); document.getElementById('drop-zone').classList.remove('drag-over'); uploadFiles(e.dataTransfer.files); }
function onFileSelect(e) { uploadFiles(e.target.files); e.target.value = ''; }

// ── Documents ─────────────────────────────────────────────────────
async function openDocsModal() {
  document.getElementById('docs-modal').classList.add('open');
  await loadDocuments();
}
function closeDocsModal() { document.getElementById('docs-modal').classList.remove('open'); }
document.getElementById('docs-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeDocsModal(); });

async function loadDocuments() {
  const list = document.getElementById('docs-list');
  const err = document.getElementById('docs-error');
  list.innerHTML = '<div class="docs-empty">Loading…</div>';
  err.textContent = '';
  try {
    const r = await fetch('/documents');
    const d = await r.json();
    if (!r.ok) { err.textContent = d.detail ?? 'Failed to load.'; return; }
    renderDocsList(d.documents);
  } catch (_) { err.textContent = 'Network error.'; }
}

function renderDocsList(docs) {
  const list = document.getElementById('docs-list');
  if (!docs.length) { list.innerHTML = '<div class="docs-empty">No documents ingested yet.</div>'; return; }
  list.innerHTML = '';
  docs.forEach(doc => {
    const item = document.createElement('div');
    item.className = 'doc-item';
    const icon = document.createElement('div');
    icon.className = 'doc-icon';
    icon.textContent = '📄';
    const info = document.createElement('div');
    info.className = 'doc-info';
    const name = document.createElement('div');
    name.className = 'doc-name';
    name.textContent = doc.source_file;
    name.title = doc.source_file;
    const meta = document.createElement('div');
    meta.className = 'doc-meta';
    meta.textContent = doc.chunk_count + ' chunks  ·  ' + doc.page_count + ' page' + (doc.page_count !== 1 ? 's' : '');
    info.append(name, meta);
    const del = document.createElement('button');
    del.className = 'doc-delete';
    del.textContent = 'Delete';
    del.onclick = () => deleteDocument(doc.document_id, doc.source_file, item, del);
    item.append(icon, info, del);
    list.appendChild(item);
  });
}

async function deleteDocument(docId, fileName, itemEl, btn) {
  if (!confirm('Delete "' + fileName + '"? This cannot be undone.')) return;
  btn.disabled = true;
  btn.textContent = 'Deleting…';
  document.getElementById('docs-error').textContent = '';
  try {
    const r = await fetch('/documents/' + encodeURIComponent(docId), { method: 'DELETE' });
    const d = await r.json();
    if (r.ok) {
      itemEl.style.opacity = '0';
      itemEl.style.transition = 'opacity 150ms';
      setTimeout(() => {
        itemEl.remove();
        if (!document.getElementById('docs-list').children.length)
          document.getElementById('docs-list').innerHTML = '<div class="docs-empty">No documents ingested yet.</div>';
      }, 150);
      await refreshHealth();
    } else {
      document.getElementById('docs-error').textContent = d.detail ?? 'Delete failed.';
      btn.disabled = false;
      btn.textContent = 'Delete';
    }
  } catch (_) {
    document.getElementById('docs-error').textContent = 'Network error.';
    btn.disabled = false;
    btn.textContent = 'Delete';
  }
}

function scrollToBottom() {
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

init();
</script>

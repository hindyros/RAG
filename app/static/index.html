<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StackAI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* ── Black theme with light-green accent ───────────────────── */
      --bg:          #000000;
      --surface:     #0d0d0d;
      --surface-2:   #141414;
      --surface-3:   #1a1a1a;
      --surface-4:   #222222;

      --text:        #F0F0F0;
      --text-2:      #D8D8D8;
      --text-muted:  #7A7A7A;
      --text-dim:    #4A4A4A;

      --blue:        #4ade80;   /* light green — primary accent */
      --blue-dim:    rgba(74, 222, 128, 0.12);
      --blue-border: rgba(74, 222, 128, 0.40);

      --green:       #4ade80;
      --green-bg:    rgba(74, 222, 128, 0.12);
      --orange:      #fb923c;
      --orange-bg:   rgba(251, 146, 60, 0.15);
      --red:         #f87171;
      --red-bg:      rgba(248, 113, 113, 0.15);

      --border:      #242424;
      --border-light:#1a1a1a;

      --radius:      2px;
      --font:        -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Helvetica Neue', Arial, sans-serif;
      --mono:        'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }

    #logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #logo img {
      height: 32px;
      width: auto;
      display: block;
    }

    #doc-badge {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: var(--text-muted);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 2px 10px;
      cursor: pointer;
      text-transform: none;
      transition: color 100ms, border-color 100ms;
    }
    #doc-badge:hover { color: var(--text); border-color: var(--surface-4); }

    .header-actions { display: flex; gap: 6px; align-items: center; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 32px;
      padding: 0 14px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 400;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 100ms, box-shadow 100ms;
      border: none;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--surface-2); color: var(--text); border-color: var(--surface-4); }
    .btn-ghost:active { background: var(--surface-3); }

    .btn-primary {
      background: var(--blue);
      color: #fff;
      border: 1px solid transparent;
    }
    .btn-primary:hover { background: #36c96b; }
    .btn-primary:active { background: #22b357; }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Messages ─────────────────────────────────────────────────── */
    #messages {
      max-width: 860px;
      margin: 0 auto;
      padding: 64px 24px 96px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 160px);
      gap: 10px;
      text-align: center;
    }
    .empty-title {
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .empty-sub {
      font-size: 15px;
      color: var(--text-muted);
      max-width: 340px;
      line-height: 1.55;
    }

    /* User message */
    .msg-user {
      align-self: flex-end;
      max-width: 62%;
      background: var(--surface-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
      word-break: break-word;
    }

    /* Assistant card */
    .msg-assistant {
      align-self: flex-start;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Answer text */
    .answer-text {
      color: var(--text);
      font-size: 15px;
      line-height: 1.8;
    }
    .answer-text strong { color: var(--text); font-weight: 600; }
    .answer-text h3 {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 12px 0 4px;
    }
    .answer-text ul, .answer-text ol {
      padding-left: 18px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .answer-text li { color: var(--text-2); }
    .answer-text sup {
      font-size: 10px;
      color: var(--blue);
      font-weight: 600;
      vertical-align: super;
      line-height: 0;
    }
    .answer-text p + p { margin-top: 8px; }

    /* Footer row */
    .card-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding-top: 8px;
      border-top: 1px solid var(--border-light);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 22px;
      padding: 0 9px;
      border-radius: 2px;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.02em;
      border: 1px solid;
      cursor: default;
    }
    .tag-green  { color: #4ade80; background: var(--green-bg);  border-color: rgba(74,222,128,0.3); }
    .tag-gray   { color: var(--text-muted); background: var(--surface-2); border-color: var(--border); }

    .dot-sep { width: 1px; height: 12px; background: var(--border); flex-shrink: 0; }

    /* Expandable toggle button */
    .toggle-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      height: 22px;
      padding: 0 9px;
      border-radius: 2px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      font-family: var(--font);
      cursor: pointer;
      transition: background 100ms, color 100ms, border-color 100ms;
    }
    .toggle-btn:hover { background: var(--surface-2); color: var(--text); border-color: var(--surface-4); }
    .toggle-btn .chevron { font-size: 8px; transition: transform 150ms; }
    .toggle-btn.open .chevron { transform: rotate(180deg); }

    /* Hallucination pill */
    .hall-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 22px;
      padding: 0 10px;
      border-radius: 2px;
      font-size: 12px;
      font-family: var(--font);
      font-weight: 500;
      letter-spacing: 0.02em;
      cursor: pointer;
      border: 1px solid;
      transition: opacity 100ms;
    }
    .hall-btn:hover { opacity: 0.8; }
    .hall-btn .chevron { font-size: 8px; transition: transform 150ms; }
    .hall-btn.open .chevron { transform: rotate(180deg); }

    .hall-green  { color: #4ade80; background: var(--green-bg);  border-color: rgba(74,222,128,0.3); }
    .hall-orange { color: #e8921f; background: var(--orange-bg); border-color: rgba(200,118,25,0.3); }
    .hall-red    { color: #e36a6e; background: var(--red-bg);    border-color: rgba(205,66,70,0.3); }

    /* Collapsible body */
    .expand-body {
      overflow: hidden;
      max-height: 0;
      transition: max-height 250ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .expand-body.open { max-height: 2000px; }

    /* Citations */
    .citation-item {
      display: flex;
      gap: 10px;
      padding: 8px 0;
      border-top: 1px solid var(--border-light);
      align-items: flex-start;
    }
    .citation-index {
      color: var(--blue);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
      min-width: 26px;
      margin-top: 1px;
    }
    .citation-meta { display: flex; flex-direction: column; gap: 2px; }
    .citation-source { color: var(--text); font-size: 14px; font-weight: 500; }
    .citation-relevance {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--mono);
    }
    .citation-excerpt { color: var(--text-muted); font-size: 13px; line-height: 1.5; margin-top: 2px; }

    /* Grounding sentence view */
    .hall-legend {
      font-size: 12px;
      color: var(--text-muted);
      padding: 8px 0 4px;
      border-top: 1px solid var(--border-light);
      margin-top: 4px;
      letter-spacing: 0.01em;
    }
    .hall-sentences { font-size: 15px; line-height: 1.85; padding-top: 4px; }
    .sent-span { border-radius: 1px; padding: 1px 2px; cursor: default; }
    .sent-green  { background: rgba(74,222,128,0.18); }
    .sent-orange { background: rgba(200,118,25,0.18); }
    .sent-red    { background: rgba(205,66,70,0.18); }

    /* ── ASCII loading ─────────────────────────────────────────── */
    .msg-loading {
      align-self: center;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0;
    }

    .ascii-frame {
      font-family: var(--mono);
      font-size: 9.5px;
      line-height: 1.3;
      color: var(--blue);
      white-space: pre;
      opacity: 0.82;
      user-select: none;
      text-align: left;
    }
    .ascii-frame span {
      opacity: 0;
      animation: charReveal 0.03s forwards;
    }
    @keyframes charReveal {
      to { opacity: 1; }
    }

    .ascii-status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      justify-content: center;
    }
    .ascii-status .pulse {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--blue);
      animation: blink 1s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes blink {
      0%, 100% { opacity: 0.2; }
      50%       { opacity: 1; }
    }

    /* ── Input bar ─────────────────────────────────────────────── */
    #input-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 12px 24px 18px;
      background: linear-gradient(to top, var(--bg) 60%, transparent);
      z-index: 100;
    }

    #input-inner {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 8px 8px 14px;
      transition: border-color 100ms, box-shadow 100ms;
    }
    #input-inner:focus-within {
      border-color: var(--blue-border);
      box-shadow: 0 0 0 2px var(--blue-dim);
    }

    #question-input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.5;
      outline: none;
      resize: none;
      min-height: 22px;
      max-height: 160px;
    }
    #question-input::placeholder { color: var(--text-dim); }

    #send-btn {
      height: 32px;
      width: 32px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: var(--blue);
      border: 1px solid transparent;
      border-radius: var(--radius);
      color: #fff;
      cursor: pointer;
      transition: background 100ms;
    }
    #send-btn:hover:not(:disabled) { background: #36c96b; }
    #send-btn:active:not(:disabled) { background: #22b357; }
    #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Modals ─────────────────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px 24px;
      width: min(500px, 92vw);
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      max-height: 85vh;
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .modal-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.01em;
    }
    .modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      line-height: 1;
      padding: 2px 5px;
      border-radius: 2px;
      transition: color 100ms, background 100ms;
    }
    .modal-close:hover { color: var(--text); background: var(--surface-2); }

    /* Upload */
    #drop-zone {
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 24px;
      text-align: center;
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color 100ms, background 100ms;
      font-size: 14px;
      line-height: 1.55;
    }
    #drop-zone .dz-icon { font-size: 22px; display: block; margin-bottom: 10px; opacity: 0.5; }
    #drop-zone .dz-hint { font-size: 12px; color: var(--text-dim); margin-top: 6px; }
    #drop-zone:hover, #drop-zone.drag-over {
      border-color: var(--blue-border);
      background: var(--blue-dim);
      color: var(--text);
    }
    #file-input { display: none; }

    #upload-status { font-size: 13px; color: var(--text-muted); min-height: 18px; text-align: center; font-family: var(--mono); }
    #upload-status.success { color: #4ade80; }
    #upload-status.error   { color: #e36a6e; }

    .modal-actions { display: flex; gap: 6px; justify-content: flex-end; }
    .modal-actions.hidden { display: none; }

    /* Documents */
    #docs-modal .modal-card { width: min(540px, 92vw); }
    #docs-list { overflow-y: auto; flex: 1; display: flex; flex-direction: column; }

    .doc-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 2px;
      transition: background 100ms;
      border-bottom: 1px solid var(--border-light);
    }
    .doc-item:last-child { border-bottom: none; }
    .doc-item:hover { background: var(--surface-2); }

    .doc-icon {
      width: 28px; height: 28px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 2px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; flex-shrink: 0;
    }
    .doc-info { flex: 1; min-width: 0; }
    .doc-name {
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .doc-meta {
      color: var(--text-muted);
      font-size: 12px;
      font-family: var(--mono);
      margin-top: 1px;
    }

    .doc-delete {
      background: none;
      border: 1px solid transparent;
      color: var(--text-dim);
      border-radius: 2px;
      padding: 4px 10px;
      font-size: 12px;
      font-family: var(--font);
      cursor: pointer;
      flex-shrink: 0;
      transition: color 100ms, border-color 100ms, background 100ms;
    }
    .doc-delete:hover { color: var(--red); border-color: rgba(205,66,70,0.4); background: var(--red-bg); }
    .doc-delete:disabled { opacity: 0.35; cursor: not-allowed; }

    .docs-empty {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      padding: 32px 0;
    }
    #docs-error { font-size: 13px; color: var(--red); min-height: 16px; font-family: var(--mono); }

    /* ── Semantic Map ───────────────────────────────────────────── */
    #map-modal .modal-card {
      width: min(860px, 96vw); height: min(82vh, 700px);
      padding: 16px 20px 20px;
    }
    #map-canvas-wrap {
      flex: 1; position: relative; overflow: hidden; min-height: 0;
      border: 1px solid var(--border); border-radius: 2px;
      background: var(--surface-2);
    }
    #map-canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }
    #map-legend {
      display: flex; flex-wrap: wrap; gap: 10px 20px;
      flex-shrink: 0; padding-top: 10px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-muted);
      font-family: var(--mono); max-width: 260px;
    }
    .legend-swatch { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #map-tooltip {
      position: fixed; pointer-events: none; display: none;
      background: var(--surface-3); border: 1px solid var(--border);
      border-radius: 2px; padding: 8px 12px; max-width: 280px;
      z-index: 9999; font-size: 12px; line-height: 1.55;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    #map-tooltip .tt-file  { color: var(--text); font-weight: 500; margin-bottom: 3px; }
    #map-tooltip .tt-meta  { color: var(--text-muted); font-family: var(--mono); font-size: 11px; margin-bottom: 5px; }
    #map-tooltip .tt-text  { color: var(--text-2); font-size: 12px; }
    #map-loading {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 13px;
      color: var(--text-muted); letter-spacing: 0.06em;
      background: var(--surface-2);
    }
    #map-search-row {
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    #map-search {
      flex: 1; height: 30px; padding: 0 10px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 2px; color: var(--text); font-family: var(--mono);
      font-size: 12px; outline: none; transition: border-color 100ms;
    }
    #map-search:focus { border-color: var(--blue-border); }
    #map-search::placeholder { color: var(--text-dim); }
    #map-clear-btn {
      display: none; height: 30px; padding: 0 10px; flex-shrink: 0;
      background: var(--surface-3); border: 1px solid var(--border);
      border-radius: 2px; color: var(--text-muted); font-size: 11px;
      font-family: var(--mono); cursor: pointer; white-space: nowrap;
      transition: color 100ms, border-color 100ms;
    }
    #map-clear-btn:hover { color: var(--red); border-color: rgba(205,66,70,0.4); }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────── -->
<header id="header">
  <div id="logo">
    <img src="/logo.png" alt="StackAI" />
    <span id="doc-badge" onclick="openDocsModal()" title="View documents">0 docs</span>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="openDocsModal()">Documents</button>
    <button class="btn btn-ghost" onclick="openMapModal()">Map</button>
    <button class="btn btn-ghost" onclick="openUploadModal()">Upload</button>
  </div>
</header>

<!-- ── Messages ────────────────────────────────────────────────────── -->
<div id="messages">
  <div id="empty-state">
    <div class="empty-title">Ask anything</div>
    <div class="empty-sub">Upload your documents, then ask questions about them.</div>
  </div>
</div>

<!-- ── Input bar ───────────────────────────────────────────────────── -->
<div id="input-bar">
  <div id="input-inner">
    <textarea id="question-input" rows="1" placeholder="Ask a question about your documents…" onkeydown="handleKey(event)"></textarea>
    <button id="send-btn" onclick="sendQuery()" title="Send (Enter)">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
        <path d="M3 8H13M13 8L9 4M13 8L9 12" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</div>

<!-- ── Upload modal ─────────────────────────────────────────────────── -->
<div id="upload-modal" class="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal-card">
    <div class="modal-header">
      <div class="modal-title">Upload documents</div>
      <button class="modal-close" onclick="closeUploadModal()">×</button>
    </div>
    <div id="drop-zone" onclick="document.getElementById('file-input').click()" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
      <span class="dz-icon">⊕</span>
      Drag &amp; drop PDF files here
      <div class="dz-hint">or click to select — PDF only, max 50 MB</div>
    </div>
    <input id="file-input" type="file" multiple accept=".pdf" onchange="onFileSelect(event)" />
    <div id="upload-status"></div>
    <div class="modal-actions hidden" id="upload-actions">
      <button class="btn btn-ghost" onclick="resetUploadModal()">Upload another</button>
      <button class="btn btn-primary" onclick="closeUploadModal()">Done</button>
    </div>
  </div>
</div>

<!-- ── Documents modal ───────────────────────────────────────────────── -->
<div id="docs-modal" class="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal-card">
    <div class="modal-header">
      <div class="modal-title">Documents</div>
      <button class="modal-close" onclick="closeDocsModal()">×</button>
    </div>
    <div id="docs-error"></div>
    <div id="docs-list"><div class="docs-empty">Loading…</div></div>
  </div>
</div>

<!-- ── Semantic Map modal ─────────────────────────────────────────────── -->
<div id="map-modal" class="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal-card">
    <div class="modal-header">
      <div class="modal-title">Semantic Map</div>
      <button class="modal-close" onclick="closeMapModal()">×</button>
    </div>
    <div id="map-search-row">
      <input id="map-search" type="text" placeholder="Search topics…" autocomplete="off" spellcheck="false" oninput="onMapSearch(this.value)" />
      <button id="map-clear-btn" onclick="clearMapSelection()">✕ Clear filter</button>
    </div>
    <div id="map-canvas-wrap">
      <canvas id="map-canvas"></canvas>
      <div id="map-loading">COMPUTING PROJECTION…</div>
    </div>
    <div id="map-legend"></div>
  </div>
</div>
<div id="map-tooltip">
  <div class="tt-file"></div>
  <div class="tt-meta"></div>
  <div class="tt-text"></div>
</div>

<script>
// ── ASCII logo ─────────────────────────────────────────────────────
const ASCII_LOGO = [
  '                       .++.                       ',
  '                    .#@@@@@@#+                    ',
  '                 +#@@@@@@@@@@@@#+                 ',
  '               +@@@@@@@@@@@@@@@@@@+               ',
  '               +@@@@@@@@@@@@@@#+.@#               ',
  '               +@@@@@@@@@@@#+    @#               ',
  '               +@@@@@@@@@#       @#               ',
  '               +@@@@@@@@@+       @#               ',
  '             .+@@@@@@@@@@+      .@@+.             ',
  '          .#@@@@@@@@@@@@@+   +#@@@@@@@#+          ',
  '       +#@@@@@@@@@@@@@@@@#+#@@@@@@@@@@@@@#+       ',
  '      .@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@+      ',
  '      .@@@@@@@@@@@@@#+. #@@@@@@@@@@@@@#+  @+      ',
  '      .@@@@@@@@@@#+     #@@@@@@@@@@#.     @+      ',
  '      .@@@@@@@@@#       #@@@@@@@@@+       @+      ',
  '      .@@@@@@@@@#       #@@@@@@@@@+       @+      ',
  '       #@@@@@@@@#     .#@@@@@@@@@@+     +#@.      ',
  '        .+@@@@@@#  +#@#+  .#@@@@@@. .+#@#.        ',
  '           .+#@@@@@#+        .+@@@@@#+.           ',
  '               .+.              .++.              ',
];

// ── State ──────────────────────────────────────────────────────────
const state = { documentCount: 0, isLoading: false };

async function init() {
  await refreshHealth();
  const ta = document.getElementById('question-input');
  ta.addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 140) + 'px';
  });
}

async function refreshHealth() {
  try {
    const r = await fetch('/health');
    if (!r.ok) return;
    const d = await r.json();
    state.documentCount = d.total_documents ?? 0;
    document.getElementById('doc-badge').textContent =
      state.documentCount + (state.documentCount === 1 ? ' doc' : ' docs');
  } catch (_) {}
}

// ── Query ───────────────────────────────────────────────────────────
async function sendQuery() {
  const input = document.getElementById('question-input');
  const question = input.value.trim();
  if (!question || state.isLoading) return;

  state.isLoading = true;
  document.getElementById('send-btn').disabled = true;

  const es = document.getElementById('empty-state');
  if (es) es.remove();

  input.value = '';
  input.style.height = 'auto';

  appendUserMessage(question);
  const placeholder = appendAsciiLoading();

  try {
    const queryBody = { question };
    const docFilter = getFilteredDocIds();
    if (docFilter) queryBody.document_ids = docFilter;
    const r = await fetch('/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(queryBody),
    });
    const data = await r.json();
    clearInterval(placeholder._animInterval);
    placeholder.replaceWith(buildAssistantCard(data));
  } catch (_) {
    clearInterval(placeholder._animInterval);
    placeholder.replaceWith(buildAssistantCard({
      answer: 'Request failed. Please try again.',
      grounded: false, citations: [], hallucination: null,
    }));
  } finally {
    state.isLoading = false;
    document.getElementById('send-btn').disabled = false;
    scrollToBottom();
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); }
}

// ── ASCII loading ──────────────────────────────────────────────────
function buildAsciiFrame(frame) {
  frame.innerHTML = '';
  let delay = 0;
  ASCII_LOGO.forEach(line => {
    for (let i = 0; i < line.length; i++) {
      const s = document.createElement('span');
      s.textContent = line[i];
      s.style.animationDelay = delay + 'ms';
      delay += 1.0;
      frame.appendChild(s);
    }
    frame.appendChild(document.createTextNode('\n'));
  });
}

function appendAsciiLoading() {
  const wrap = document.createElement('div');
  wrap.className = 'msg-loading';

  const frame = document.createElement('div');
  frame.className = 'ascii-frame';
  buildAsciiFrame(frame);

  const status = document.createElement('div');
  status.className = 'ascii-status';
  status.innerHTML = '<div class="pulse"></div>PROCESSING QUERY';

  wrap.appendChild(frame);
  wrap.appendChild(status);

  // Loop: rebuild spans every 1200ms (1000ms reveal + 200ms hold)
  wrap._animInterval = setInterval(() => buildAsciiFrame(frame), 1200);

  document.getElementById('messages').appendChild(wrap);
  scrollToBottom();
  return wrap;
}

// ── Messages ────────────────────────────────────────────────────────
function appendUserMessage(text) {
  const el = document.createElement('div');
  el.className = 'msg-user';
  el.textContent = text;
  document.getElementById('messages').appendChild(el);
  scrollToBottom();
}

function buildAssistantCard(data) {
  const card = document.createElement('div');
  card.className = 'msg-assistant';

  // Answer
  const answerEl = document.createElement('div');
  answerEl.className = 'answer-text';
  answerEl.innerHTML = renderMarkdown(data.answer ?? '');
  card.appendChild(answerEl);

  // Footer
  const footer = document.createElement('div');
  footer.className = 'card-footer';

  // Source tag
  const srcTag = document.createElement('span');
  srcTag.className = data.grounded ? 'tag tag-green' : 'tag tag-gray';
  srcTag.textContent = data.grounded ? '● SOURCED' : '◌ GENERAL';
  footer.appendChild(srcTag);

  // Citations toggle
  if (data.citations && data.citations.length > 0) {
    footer.appendChild(makeSep());
    footer.appendChild(makeCitationsToggle(data.citations));
  }

  // Grounding score
  if (data.grounded && data.hallucination) {
    footer.appendChild(makeSep());
    footer.appendChild(makeHallPill(data.hallucination));
  }

  card.appendChild(footer);

  // Expandable bodies
  if (data.citations && data.citations.length > 0) {
    card.appendChild(buildCitationsBody(data.citations));
  }
  if (data.grounded && data.hallucination) {
    card.appendChild(buildHallBody(data.hallucination));
  }

  setTimeout(() => wireToggles(card), 0);
  return card;
}

function makeSep() {
  const d = document.createElement('span');
  d.className = 'dot-sep';
  return d;
}

// ── Citations ────────────────────────────────────────────────────────
function makeCitationsToggle(citations) {
  const btn = document.createElement('button');
  btn.className = 'toggle-btn';
  btn.dataset.target = 'citations';
  btn.innerHTML = citations.length + ' source' + (citations.length !== 1 ? 's' : '') +
    ' <span class="chevron">▾</span>';
  return btn;
}

function buildCitationsBody(citations) {
  const body = document.createElement('div');
  body.className = 'expand-body';
  body.dataset.role = 'citations';
  for (const c of citations) {
    const item = document.createElement('div');
    item.className = 'citation-item';

    const idx = document.createElement('span');
    idx.className = 'citation-index';
    idx.textContent = '[' + c.index + ']';

    const meta = document.createElement('div');
    meta.className = 'citation-meta';

    const src = document.createElement('span');
    src.className = 'citation-source';
    src.textContent = c.source_file + (c.page_number ? '  ·  p.' + c.page_number : '');

    const rel = document.createElement('span');
    rel.className = 'citation-relevance';
    rel.textContent = 'relevance: ' + Math.round(c.similarity_score * 100) + '%';

    const exc = document.createElement('span');
    exc.className = 'citation-excerpt';
    exc.textContent = c.excerpt;

    meta.append(src, rel, exc);
    item.append(idx, meta);
    body.appendChild(item);
  }
  return body;
}

// ── Grounding score ───────────────────────────────────────────────
function hallCls(s)     { return s >= 0.7 ? 'hall-green' : s >= 0.4 ? 'hall-orange' : 'hall-red'; }
function hallVerdict(s) {
  const pct = Math.round(s * 100) + '%';
  return s >= 0.7 ? 'Grounded ' + pct : s >= 0.4 ? 'Uncertain ' + pct : 'Unsupported ' + pct;
}

function makeHallPill(h) {
  const btn = document.createElement('button');
  btn.className = 'hall-btn ' + hallCls(h.overall_score);
  btn.dataset.target = 'hall';
  btn.title = 'Per-sentence grounding score — how well the answer is supported by your documents';
  btn.innerHTML = hallVerdict(h.overall_score) + ' <span class="chevron">▾</span>';
  return btn;
}

function buildHallBody(h) {
  const body = document.createElement('div');
  body.className = 'expand-body';
  body.dataset.role = 'hall';

  const legend = document.createElement('div');
  legend.className = 'hall-legend';
  legend.textContent = 'Per-sentence grounding — highlight indicates how well each sentence is supported by your documents:';
  body.appendChild(legend);

  const inner = document.createElement('div');
  inner.className = 'hall-sentences';
  for (const ss of h.sentences) {
    const span = document.createElement('span');
    span.className = 'sent-span ' + (ss.score >= 0.7 ? 'sent-green' : ss.score >= 0.4 ? 'sent-orange' : 'sent-red');
    span.title = Math.round(ss.score * 100) + '% supported by sources';
    span.textContent = ss.sentence + ' ';
    inner.appendChild(span);
  }
  body.appendChild(inner);
  return body;
}

function wireToggles(card) {
  card.querySelectorAll('[data-target]').forEach(toggle => {
    const body = card.querySelector('[data-role="' + toggle.dataset.target + '"]');
    if (!body) return;
    toggle.addEventListener('click', () => {
      const open = body.classList.toggle('open');
      toggle.classList.toggle('open', open);
    });
  });
}

// ── Markdown ──────────────────────────────────────────────────────────
function renderMarkdown(raw) {
  let h = raw.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm, '<h3>$1</h3>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\[(\d+)\]/g, '<sup>[$1]</sup>');
  h = h.replace(/^[*\-] (.+)$/gm, '<li>$1</li>');
  h = h.replace(/(<li>.*<\/li>\n?)+/g, m => '<ul>' + m + '</ul>');
  h = h.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  return h.split(/\n{2,}/).map(p => {
    p = p.trim();
    if (!p || /^<(h3|ul|ol|li)/.test(p)) return p;
    return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
  }).filter(Boolean).join('');
}

// ── Upload ─────────────────────────────────────────────────────────
async function uploadFiles(files) {
  if (!files || !files.length) return;
  setUploadStatus('Uploading…', '');
  document.getElementById('upload-actions').classList.add('hidden');

  const fd = new FormData();
  for (const f of files) fd.append('files', f);

  try {
    const r = await fetch('/ingest', { method: 'POST', body: fd });
    const d = await r.json();
    if (r.ok) {
      setUploadStatus('✓ ' + d.chunks_added + ' chunks added from ' + d.files_processed + ' file(s)', 'success');
      document.getElementById('drop-zone').style.display = 'none';
      document.getElementById('upload-actions').classList.remove('hidden');
      await refreshHealth();
      invalidateMapCache();
    } else {
      setUploadStatus(d.detail ?? 'Upload failed.', 'error');
    }
  } catch (_) {
    setUploadStatus('Network error.', 'error');
  }
}

function setUploadStatus(msg, cls) {
  const el = document.getElementById('upload-status');
  el.textContent = msg;
  el.className = cls;
}

function openUploadModal()  { resetUploadModal(); document.getElementById('upload-modal').classList.add('open'); }
function closeUploadModal() { document.getElementById('upload-modal').classList.remove('open'); }
function resetUploadModal() {
  setUploadStatus('', '');
  document.getElementById('drop-zone').style.display = '';
  document.getElementById('upload-actions').classList.add('hidden');
  document.getElementById('file-input').value = '';
}

document.getElementById('upload-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeUploadModal(); });
function onDragOver(e)   { e.preventDefault(); document.getElementById('drop-zone').classList.add('drag-over'); }
function onDragLeave()   { document.getElementById('drop-zone').classList.remove('drag-over'); }
function onDrop(e)       { e.preventDefault(); document.getElementById('drop-zone').classList.remove('drag-over'); uploadFiles(e.dataTransfer.files); }
function onFileSelect(e) { uploadFiles(e.target.files); e.target.value = ''; }

// ── Documents ─────────────────────────────────────────────────────
async function openDocsModal() {
  document.getElementById('docs-modal').classList.add('open');
  await loadDocuments();
}
function closeDocsModal() { document.getElementById('docs-modal').classList.remove('open'); }
document.getElementById('docs-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeDocsModal(); });

async function loadDocuments() {
  const list = document.getElementById('docs-list');
  const err = document.getElementById('docs-error');
  list.innerHTML = '<div class="docs-empty">Loading…</div>';
  err.textContent = '';
  try {
    const r = await fetch('/documents');
    const d = await r.json();
    if (!r.ok) { err.textContent = d.detail ?? 'Failed to load.'; return; }
    renderDocsList(d.documents);
  } catch (_) { err.textContent = 'Network error.'; }
}

function renderDocsList(docs) {
  const list = document.getElementById('docs-list');
  if (!docs.length) { list.innerHTML = '<div class="docs-empty">No documents ingested yet.</div>'; return; }
  list.innerHTML = '';
  docs.forEach(doc => {
    const item = document.createElement('div');
    item.className = 'doc-item';
    const icon = document.createElement('div');
    icon.className = 'doc-icon';
    icon.textContent = '📄';
    const info = document.createElement('div');
    info.className = 'doc-info';
    const name = document.createElement('div');
    name.className = 'doc-name';
    name.textContent = doc.source_file;
    name.title = doc.source_file;
    const meta = document.createElement('div');
    meta.className = 'doc-meta';
    meta.textContent = doc.chunk_count + ' chunks  ·  ' + doc.page_count + ' page' + (doc.page_count !== 1 ? 's' : '');
    info.append(name, meta);
    const del = document.createElement('button');
    del.className = 'doc-delete';
    del.textContent = 'Delete';
    del.onclick = () => deleteDocument(doc.document_id, doc.source_file, item, del);
    item.append(icon, info, del);
    list.appendChild(item);
  });
}

async function deleteDocument(docId, fileName, itemEl, btn) {
  if (!confirm('Delete "' + fileName + '"? This cannot be undone.')) return;
  btn.disabled = true;
  btn.textContent = 'Deleting…';
  document.getElementById('docs-error').textContent = '';
  try {
    const r = await fetch('/documents/' + encodeURIComponent(docId), { method: 'DELETE' });
    const d = await r.json();
    if (r.ok) {
      itemEl.style.opacity = '0';
      itemEl.style.transition = 'opacity 150ms';
      setTimeout(() => {
        itemEl.remove();
        if (!document.getElementById('docs-list').children.length)
          document.getElementById('docs-list').innerHTML = '<div class="docs-empty">No documents ingested yet.</div>';
      }, 150);
      await refreshHealth();
      invalidateMapCache();
    } else {
      document.getElementById('docs-error').textContent = d.detail ?? 'Delete failed.';
      btn.disabled = false;
      btn.textContent = 'Delete';
    }
  } catch (_) {
    document.getElementById('docs-error').textContent = 'Network error.';
    btn.disabled = false;
    btn.textContent = 'Delete';
  }
}

function scrollToBottom() {
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

// ── Semantic Map ────────────────────────────────────────────────────
const MAP_PALETTE = [
  '#4ade80', '#60a5fa', '#f472b6', '#fb923c',
  '#a78bfa', '#34d399', '#fbbf24', '#f87171',
];
const DOT_R = 5;

const mapState = {
  data: null,
  docColorMap: {},
  scale: 1,
  offsetX: 0,
  offsetY: 0,
  screenPts: [],
  clusterScreenPts: [],
  clusterLabelRects: [],
  hoveredIndex: -1,
  dragging: false,
  dragStartX: 0,
  dragStartY: 0,
  dragOffX: 0,
  dragOffY: 0,
  selectedClusters: new Set(),
  searchHighlight: -1,
};

function openMapModal() {
  document.getElementById('map-modal').classList.add('open');
  document.getElementById('map-search').value = '';
  mapState.searchHighlight = -1;
  if (mapState.data === null) {
    loadMapData();
  } else {
    resizeAndDraw();
  }
}

function closeMapModal() {
  document.getElementById('map-modal').classList.remove('open');
  document.getElementById('map-tooltip').style.display = 'none';
  mapState.searchHighlight = -1;
}

document.getElementById('map-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeMapModal();
});

async function loadMapData() {
  document.getElementById('map-loading').style.display = 'flex';
  try {
    const r = await fetch('/visualize');
    const d = await r.json();
    mapState.data = d;
    mapState.scale = 1;
    mapState.offsetX = 0;
    mapState.offsetY = 0;

    // Build color map
    mapState.docColorMap = {};
    d.document_ids.forEach((id, i) => {
      mapState.docColorMap[id] = MAP_PALETTE[i % MAP_PALETTE.length];
    });

    // Build legend
    const legend = document.getElementById('map-legend');
    legend.innerHTML = '';
    d.document_ids.forEach((id, i) => {
      const pt = d.points.find(p => p.document_id === id);
      const label = pt ? pt.source_file : id;
      const color = MAP_PALETTE[i % MAP_PALETTE.length];
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `<span class="legend-swatch" style="background:${color}"></span><span class="legend-label" title="${label}">${label}</span>`;
      legend.appendChild(item);
    });

    document.getElementById('map-loading').style.display = 'none';
    resizeAndDraw();
  } catch (_) {
    document.getElementById('map-loading').textContent = 'FAILED TO LOAD DATA';
  }
}

function computeScreenPoints(w, h) {
  const pts = mapState.data.points;
  if (!pts.length) { mapState.screenPts = []; mapState.clusterScreenPts = []; return; }

  const xs = pts.map(p => p.x);
  const ys = pts.map(p => p.y);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const rangeX = maxX - minX || 1;
  const rangeY = maxY - minY || 1;
  const pad = 0.05;

  const toScreen = (x, y) => ({
    sx: (pad + (x - minX) / rangeX * (1 - 2 * pad)) * w,
    sy: (pad + (1 - (y - minY) / rangeY) * (1 - 2 * pad)) * h,
  });

  mapState.screenPts = pts.map(p => ({ ...toScreen(p.x, p.y), pt: p }));
  mapState.clusterScreenPts = (mapState.data.clusters || []).map(c => ({
    ...toScreen(c.centroid_x, c.centroid_y),
    cluster: c,
  }));
}

function _clusterIsDim(clusterId) {
  if (mapState.selectedClusters.size > 0) return !mapState.selectedClusters.has(clusterId);
  if (mapState.searchHighlight >= 0) return clusterId !== mapState.searchHighlight;
  return false;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function drawMap(ctx, w, h) {
  ctx.clearRect(0, 0, w, h);
  ctx.save();
  ctx.translate(mapState.offsetX, mapState.offsetY);
  ctx.scale(mapState.scale, mapState.scale);

  for (let i = 0; i < mapState.screenPts.length; i++) {
    const { sx, sy, pt } = mapState.screenPts[i];
    const color = mapState.docColorMap[pt.document_id] || '#888';
    const hovered = i === mapState.hoveredIndex;
    const dim = _clusterIsDim(pt.cluster_id);

    ctx.beginPath();
    ctx.arc(sx, sy, DOT_R, 0, Math.PI * 2);

    if (hovered && !dim) {
      ctx.fillStyle = '#ffffff';
      ctx.fill();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2.5 / mapState.scale;
      ctx.shadowColor = color;
      ctx.shadowBlur = 10;
      ctx.stroke();
      ctx.shadowBlur = 0;
    } else {
      ctx.fillStyle = dim ? color + '28' : color + 'bf';
      ctx.fill();
    }
  }
  ctx.restore();

  // Draw cluster labels in screen space (on top of dots)
  mapState.clusterLabelRects = [];
  if (!mapState.clusterScreenPts.length) return;

  ctx.font = '11px monospace';
  const PAD_X = 8, RH = 20;

  for (const { sx, sy, cluster } of mapState.clusterScreenPts) {
    const screenX = sx * mapState.scale + mapState.offsetX;
    const screenY = sy * mapState.scale + mapState.offsetY;

    const label = cluster.label;
    const tw = ctx.measureText(label).width;
    const rw = tw + PAD_X * 2;
    const rx = screenX - rw / 2;
    const ry = screenY - RH - 10;

    mapState.clusterLabelRects.push({ rx, ry, rw, rh: RH, cluster_id: cluster.cluster_id });

    const isSelected = mapState.selectedClusters.has(cluster.cluster_id);
    const isHighlighted = cluster.cluster_id === mapState.searchHighlight;
    const dim = _clusterIsDim(cluster.cluster_id);

    ctx.globalAlpha = dim ? 0.25 : 1.0;

    // Background pill
    ctx.fillStyle = isSelected ? 'rgba(74,222,128,0.2)'
                  : isHighlighted ? 'rgba(255,255,255,0.12)'
                  : 'rgba(14,14,14,0.85)';
    roundRect(ctx, rx, ry, rw, RH, 3);
    ctx.fill();

    // Border
    if (isSelected || isHighlighted) {
      ctx.strokeStyle = isSelected ? '#4ade80' : 'rgba(255,255,255,0.35)';
      ctx.lineWidth = isSelected ? 1.5 : 1;
      roundRect(ctx, rx, ry, rw, RH, 3);
      ctx.stroke();
    }

    // Label text
    ctx.fillStyle = isSelected ? '#4ade80' : isHighlighted ? '#e0e0e0' : '#7a7a7a';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, screenX, ry + RH / 2);
    ctx.globalAlpha = 1.0;
  }
}

function resizeAndDraw() {
  const canvas = document.getElementById('map-canvas');
  const wrap = document.getElementById('map-canvas-wrap');
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  canvas.width = w;
  canvas.height = h;
  if (!mapState.data || !mapState.data.points.length) return;
  computeScreenPoints(w, h);
  drawMap(canvas.getContext('2d'), w, h);
}

function showMapTooltip(clientX, clientY, pt) {
  const tt = document.getElementById('map-tooltip');
  tt.querySelector('.tt-file').textContent = pt.source_file;
  const metaParts = ['p.' + pt.page_number];
  if (pt.section_header) metaParts.push(pt.section_header);
  tt.querySelector('.tt-meta').textContent = metaParts.join('  ·  ');
  tt.querySelector('.tt-text').textContent = pt.excerpt;
  tt.style.display = 'block';

  const ttW = 280, ttH = 120;
  let left = clientX + 14;
  let top = clientY - 10;
  if (left + ttW > window.innerWidth - 8) left = clientX - ttW - 14;
  if (top + ttH > window.innerHeight - 8) top = window.innerHeight - ttH - 8;
  tt.style.left = left + 'px';
  tt.style.top = top + 'px';
}

function invalidateMapCache() {
  mapState.data = null;
  mapState.selectedClusters.clear();
  mapState.searchHighlight = -1;
  updateFilterBadge();
}

function onMapSearch(query) {
  const q = query.trim().toLowerCase();
  mapState.searchHighlight = -1;
  if (q && mapState.data && mapState.data.clusters) {
    // Exact substring match first, then prefix
    const clusters = mapState.data.clusters;
    const exact = clusters.find(c => c.label.toLowerCase().includes(q));
    if (exact) mapState.searchHighlight = exact.cluster_id;
  }
  const canvas = document.getElementById('map-canvas');
  drawMap(canvas.getContext('2d'), canvas.width, canvas.height);
}

function updateFilterBadge() {
  const btn = document.getElementById('map-clear-btn');
  const n = mapState.selectedClusters.size;
  if (n > 0) {
    btn.textContent = '✕  ' + n + ' cluster' + (n !== 1 ? 's' : '') + ' selected';
    btn.style.display = '';
  } else {
    btn.style.display = 'none';
  }
}

function clearMapSelection() {
  mapState.selectedClusters.clear();
  updateFilterBadge();
  const canvas = document.getElementById('map-canvas');
  drawMap(canvas.getContext('2d'), canvas.width, canvas.height);
}

function getFilteredDocIds() {
  if (!mapState.selectedClusters.size || !mapState.data) return null;
  const docIds = new Set();
  for (const pt of mapState.data.points) {
    if (mapState.selectedClusters.has(pt.cluster_id)) docIds.add(pt.document_id);
  }
  return [...docIds];
}

function setupMapEvents() {
  const canvas = document.getElementById('map-canvas');

  canvas.addEventListener('mousemove', e => {
    if (!mapState.screenPts.length) return;

    if (mapState.dragging) {
      mapState.offsetX = mapState.dragOffX + (e.clientX - mapState.dragStartX);
      mapState.offsetY = mapState.dragOffY + (e.clientY - mapState.dragStartY);
      drawMap(canvas.getContext('2d'), canvas.width, canvas.height);
      return;
    }

    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    const mx = (cx - mapState.offsetX) / mapState.scale;
    const my = (cy - mapState.offsetY) / mapState.scale;
    const hitR = (DOT_R + 4) / mapState.scale;

    // Dot hover
    let found = -1;
    for (let i = 0; i < mapState.screenPts.length; i++) {
      const { sx, sy } = mapState.screenPts[i];
      const dx = mx - sx, dy = my - sy;
      if (dx * dx + dy * dy < hitR * hitR) { found = i; break; }
    }

    if (found !== mapState.hoveredIndex) {
      mapState.hoveredIndex = found;
      drawMap(canvas.getContext('2d'), canvas.width, canvas.height);
    }

    // Cluster label hover
    const overLabel = mapState.clusterLabelRects.some(
      r => cx >= r.rx && cx <= r.rx + r.rw && cy >= r.ry && cy <= r.ry + r.rh
    );

    if (overLabel || found >= 0) {
      canvas.style.cursor = 'pointer';
      if (found >= 0 && !overLabel) {
        showMapTooltip(e.clientX, e.clientY, mapState.screenPts[found].pt);
      } else {
        document.getElementById('map-tooltip').style.display = 'none';
      }
    } else {
      document.getElementById('map-tooltip').style.display = 'none';
      canvas.style.cursor = 'crosshair';
    }
  });

  canvas.addEventListener('click', e => {
    if (mapState.dragging) return;
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    for (const r of mapState.clusterLabelRects) {
      if (cx >= r.rx && cx <= r.rx + r.rw && cy >= r.ry && cy <= r.ry + r.rh) {
        if (mapState.selectedClusters.has(r.cluster_id)) {
          mapState.selectedClusters.delete(r.cluster_id);
        } else {
          mapState.selectedClusters.add(r.cluster_id);
        }
        updateFilterBadge();
        drawMap(canvas.getContext('2d'), canvas.width, canvas.height);
        return;
      }
    }
  });

  canvas.addEventListener('mousedown', e => {
    mapState.dragging = true;
    mapState.dragStartX = e.clientX;
    mapState.dragStartY = e.clientY;
    mapState.dragOffX = mapState.offsetX;
    mapState.dragOffY = mapState.offsetY;
    canvas.style.cursor = 'grabbing';
  });

  window.addEventListener('mouseup', () => {
    if (mapState.dragging) {
      mapState.dragging = false;
      canvas.style.cursor = 'crosshair';
    }
  });

  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const delta = e.deltaY < 0 ? 1.15 : 1 / 1.15;
    const newScale = Math.min(20, Math.max(0.3, mapState.scale * delta));
    mapState.offsetX = mx - (mx - mapState.offsetX) * (newScale / mapState.scale);
    mapState.offsetY = my - (my - mapState.offsetY) * (newScale / mapState.scale);
    mapState.scale = newScale;
    drawMap(canvas.getContext('2d'), canvas.width, canvas.height);
  }, { passive: false });

  canvas.addEventListener('dblclick', () => {
    mapState.scale = 1;
    mapState.offsetX = 0;
    mapState.offsetY = 0;
    drawMap(canvas.getContext('2d'), canvas.width, canvas.height);
  });

  window.addEventListener('resize', () => {
    if (document.getElementById('map-modal').classList.contains('open')) {
      resizeAndDraw();
    }
  });
}

setupMapEvents();

init();
</script>
</body>
</html>

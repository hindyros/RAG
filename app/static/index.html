<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #1b1b1b;
      --surface:    #222222;
      --surface-2:  #2a2a2a;
      --text:       #c5c1b9;
      --text-bright:#dcdad5;
      --muted:      #6e6b65;
      --accent:     #575ECF;
      --accent-dim: rgba(87, 94, 207, 0.12);
      --border:     rgba(255, 255, 255, 0.06);
      --border-mid: rgba(255, 255, 255, 0.10);
      --green:      #4caf82;
      --yellow:     #c9921a;
      --red:        #c05555;
      --ease:       cubic-bezier(0.16, 1, 0.32, 1);
      --font:       -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ───────────────────────────────────────────────────── */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      background: rgba(27, 27, 27, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }

    #logo {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--text-bright);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #doc-badge {
      font-size: 12px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 3px 10px;
      cursor: pointer;
      transition: color 150ms, border-color 150ms;
    }
    #doc-badge:hover { color: var(--text); border-color: var(--border-mid); }

    .header-actions { display: flex; gap: 8px; align-items: center; }

    .btn-header {
      font-size: 14px;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border-mid);
      border-radius: 8px;
      padding: 7px 16px;
      cursor: pointer;
      transition: background 150ms, border-color 150ms, color 150ms;
    }
    .btn-header:hover { background: var(--surface-2); border-color: rgba(255,255,255,0.16); color: var(--text-bright); }
    .btn-header:active { transform: scale(0.98); }

    /* ── Messages ─────────────────────────────────────────────────── */
    #messages {
      max-width: 800px;
      margin: 0 auto;
      padding: 80px 28px 100px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 180px);
      gap: 12px;
      text-align: center;
    }
    .empty-title { font-size: 22px; font-weight: 500; color: var(--text); letter-spacing: -0.02em; }
    .empty-sub   { font-size: 15px; color: var(--muted); max-width: 360px; line-height: 1.6; }

    .msg-user {
      align-self: flex-end;
      max-width: 68%;
      background: var(--accent-dim);
      border: 1px solid rgba(87, 94, 207, 0.22);
      border-radius: 20px 20px 5px 20px;
      padding: 12px 18px;
      color: var(--text-bright);
      font-size: 15px;
      line-height: 1.6;
      word-break: break-word;
    }

    .msg-assistant {
      align-self: flex-start;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px 20px 20px 20px;
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .answer-text { color: var(--text-bright); font-size: 15px; line-height: 1.75; }
    .answer-text strong { color: #e8e5de; font-weight: 600; }
    .answer-text h3 { font-size: 14px; font-weight: 600; color: var(--text-bright); margin: 12px 0 4px; text-transform: uppercase; letter-spacing: 0.06em; }
    .answer-text ul, .answer-text ol { padding-left: 22px; display: flex; flex-direction: column; gap: 4px; }
    .answer-text li { color: var(--text); }
    .answer-text sup { font-size: 10px; color: var(--accent); font-weight: 600; vertical-align: super; line-height: 0; }
    .answer-text p + p { margin-top: 10px; }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      padding-top: 2px;
      border-top: 1px solid var(--border);
    }

    .badge-sourced { font-size: 12px; color: var(--green);  display: inline-flex; align-items: center; gap: 5px; }
    .badge-general { font-size: 12px; color: var(--muted);  display: inline-flex; align-items: center; gap: 5px; }
    .dot-sep { width: 3px; height: 3px; border-radius: 50%; background: var(--border-mid); flex-shrink: 0; }

    .citations-toggle {
      font-size: 13px; color: var(--muted); cursor: pointer; user-select: none;
      display: inline-flex; align-items: center; gap: 5px; transition: color 150ms;
    }
    .citations-toggle:hover { color: var(--text); }
    .citations-toggle .chevron { font-size: 10px; display: inline-block; transition: transform 200ms var(--ease); }
    .citations-toggle.open .chevron { transform: rotate(180deg); }

    .citations-body { overflow: hidden; max-height: 0; transition: max-height 300ms var(--ease); }
    .citations-body.open { max-height: 2000px; }

    .citation-item { display: flex; gap: 12px; padding: 10px 0; border-top: 1px solid var(--border); align-items: baseline; }
    .citation-index { color: var(--accent); font-weight: 600; font-size: 12px; flex-shrink: 0; min-width: 24px; }
    .citation-meta { display: flex; flex-direction: column; gap: 3px; }
    .citation-source { color: var(--text-bright); font-size: 13px; font-weight: 500; }
    .citation-score { color: var(--muted); font-size: 12px; }
    .citation-excerpt { color: var(--muted); font-size: 13px; line-height: 1.5; }

    .hall-toggle {
      font-size: 12px; cursor: pointer; user-select: none;
      display: inline-flex; align-items: center; gap: 5px;
      border-radius: 99px; padding: 3px 10px; border: 1px solid;
      transition: opacity 150ms;
    }
    .hall-toggle:hover { opacity: 0.75; }
    .hall-toggle:active { transform: scale(0.97); }
    .hall-toggle .chevron { font-size: 10px; display: inline-block; transition: transform 200ms var(--ease); }
    .hall-toggle.open .chevron { transform: rotate(180deg); }
    .hall-consistent { color: var(--green);  background: rgba(76,175,130,0.08); border-color: rgba(76,175,130,0.2); }
    .hall-check      { color: var(--yellow); background: rgba(201,146,26,0.08); border-color: rgba(201,146,26,0.2); }
    .hall-flagged    { color: var(--red);    background: rgba(192,85,85,0.08);  border-color: rgba(192,85,85,0.2); }

    .hall-body { overflow: hidden; max-height: 0; transition: max-height 350ms var(--ease); }
    .hall-body.open { max-height: 2000px; }
    .hall-sentences { font-size: 15px; line-height: 1.8; padding-top: 10px; }
    .sent-span { border-radius: 3px; padding: 1px 3px; cursor: default; }
    .sent-green  { background: rgba(76,175,130,0.14); }
    .sent-yellow { background: rgba(201,146,26,0.16); }
    .sent-red    { background: rgba(192,85,85,0.16); }

    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, rgba(255,255,255,0.05) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px; height: 16px;
    }
    .skeleton + .skeleton { margin-top: 10px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ── Input bar ────────────────────────────────────────────────── */
    #input-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 14px 28px 20px;
      background: linear-gradient(to top, var(--bg) 70%, transparent);
      z-index: 100;
    }

    #input-inner {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border-mid);
      border-radius: 14px;
      padding: 10px 10px 10px 18px;
      transition: border-color 150ms;
    }
    #input-inner:focus-within { border-color: rgba(87, 94, 207, 0.45); }

    #question-input {
      flex: 1; background: none; border: none;
      color: var(--text-bright); font-family: var(--font);
      font-size: 15px; line-height: 1.6;
      outline: none; resize: none;
      min-height: 24px; max-height: 160px;
    }
    #question-input::placeholder { color: var(--muted); }

    #send-btn {
      background: var(--accent); color: #fff; border: none;
      border-radius: 9px; width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: opacity 150ms, transform 100ms;
    }
    #send-btn:hover:not(:disabled) { opacity: 0.85; }
    #send-btn:active:not(:disabled) { transform: scale(0.93); }
    #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Shared modal base ────────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal-card {
      background: var(--surface);
      border: 1px solid var(--border-mid);
      border-radius: 16px;
      padding: 28px 32px 32px;
      width: min(520px, 92vw);
      display: flex; flex-direction: column; gap: 20px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
      max-height: 85vh;
      overflow: hidden;
    }

    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .modal-title { font-size: 17px; font-weight: 500; color: var(--text-bright); letter-spacing: -0.01em; }
    .modal-close {
      background: none; border: none; color: var(--muted);
      font-size: 20px; cursor: pointer; line-height: 1;
      padding: 2px 6px; border-radius: 6px; transition: color 150ms, background 150ms;
    }
    .modal-close:hover { color: var(--text); background: var(--surface-2); }

    /* ── Upload modal ─────────────────────────────────────────────── */
    #drop-zone {
      border: 1.5px dashed var(--border-mid);
      border-radius: 12px; padding: 44px 24px;
      text-align: center; color: var(--muted);
      cursor: pointer; transition: border-color 150ms, background 150ms;
      font-size: 14px; line-height: 1.6;
    }
    #drop-zone .dz-icon { font-size: 28px; display: block; margin-bottom: 10px; opacity: 0.5; }
    #drop-zone .dz-hint { font-size: 12px; color: var(--muted); margin-top: 6px; opacity: 0.7; }
    #drop-zone:hover, #drop-zone.drag-over { border-color: var(--accent); background: var(--accent-dim); color: var(--text); }
    #file-input { display: none; }

    #upload-status { font-size: 13px; color: var(--muted); min-height: 18px; text-align: center; }
    #upload-status.success { color: var(--green); }
    #upload-status.error   { color: var(--red); }

    .upload-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .upload-actions.hidden { display: none; }

    .btn-secondary {
      background: none; border: 1px solid var(--border-mid);
      color: var(--muted); border-radius: 8px; padding: 7px 16px;
      font-family: var(--font); font-size: 14px; cursor: pointer;
      transition: color 150ms, border-color 150ms;
    }
    .btn-secondary:hover { color: var(--text); border-color: rgba(255,255,255,0.16); }

    .btn-primary {
      background: var(--accent); border: none; color: #fff;
      border-radius: 8px; padding: 7px 16px;
      font-family: var(--font); font-size: 14px; cursor: pointer;
      transition: opacity 150ms;
    }
    .btn-primary:hover { opacity: 0.85; }

    /* ── Documents modal ──────────────────────────────────────────── */
    #docs-modal .modal-card { width: min(600px, 92vw); }

    #docs-list {
      overflow-y: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .doc-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 8px;
      transition: background 150ms;
    }
    .doc-item:hover { background: var(--surface-2); }

    .doc-icon {
      width: 36px; height: 36px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
      color: var(--muted);
    }

    .doc-info { flex: 1; min-width: 0; }
    .doc-name {
      color: var(--text-bright); font-size: 14px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .doc-meta { color: var(--muted); font-size: 12px; margin-top: 2px; }

    .doc-delete {
      background: none; border: 1px solid transparent; color: var(--muted);
      border-radius: 6px; padding: 5px 10px; font-size: 12px;
      cursor: pointer; flex-shrink: 0;
      transition: color 150ms, border-color 150ms, background 150ms;
    }
    .doc-delete:hover { color: var(--red); border-color: rgba(192,85,85,0.3); background: rgba(192,85,85,0.07); }
    .doc-delete:disabled { opacity: 0.4; cursor: not-allowed; }

    .docs-empty {
      text-align: center; color: var(--muted);
      font-size: 14px; padding: 40px 0;
    }

    #docs-error { font-size: 13px; color: var(--red); min-height: 18px; }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────── -->
<header id="header">
  <div id="logo">
    RAG
    <span id="doc-badge" onclick="openDocsModal()" title="View documents">0 docs</span>
  </div>
  <div class="header-actions">
    <button class="btn-header" onclick="openDocsModal()">Documents</button>
    <button class="btn-header" onclick="openUploadModal()">Upload ⊕</button>
  </div>
</header>

<!-- ── Messages ────────────────────────────────────────────────────── -->
<div id="messages">
  <div id="empty-state">
    <div class="empty-title">Ask anything</div>
    <div class="empty-sub">Upload documents first, then ask questions about their content.</div>
  </div>
</div>

<!-- ── Input bar ───────────────────────────────────────────────────── -->
<div id="input-bar">
  <div id="input-inner">
    <textarea id="question-input" rows="1" placeholder="Ask a question…" onkeydown="handleKey(event)"></textarea>
    <button id="send-btn" onclick="sendQuery()" title="Send">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 8L13 8M13 8L9 4M13 8L9 12" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</div>

<!-- ── Upload modal ─────────────────────────────────────────────────── -->
<div id="upload-modal" class="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal-card">
    <div class="modal-header">
      <div class="modal-title">Upload documents</div>
      <button class="modal-close" onclick="closeUploadModal()">×</button>
    </div>
    <div
      id="drop-zone"
      onclick="document.getElementById('file-input').click()"
      ondragover="onDragOver(event)"
      ondragleave="onDragLeave(event)"
      ondrop="onDrop(event)"
    >
      <span class="dz-icon">⊕</span>
      Drag &amp; drop PDF files here
      <div class="dz-hint">or click to select — PDF only, max 50 MB each</div>
    </div>
    <input id="file-input" type="file" multiple accept=".pdf" onchange="onFileSelect(event)" />
    <div id="upload-status"></div>
    <!-- shown only after a successful upload -->
    <div class="upload-actions hidden" id="upload-actions">
      <button class="btn-secondary" onclick="resetUploadModal()">Upload another</button>
      <button class="btn-primary" onclick="closeUploadModal()">Done</button>
    </div>
  </div>
</div>

<!-- ── Documents modal ───────────────────────────────────────────────── -->
<div id="docs-modal" class="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal-card">
    <div class="modal-header">
      <div class="modal-title">Documents</div>
      <button class="modal-close" onclick="closeDocsModal()">×</button>
    </div>
    <div id="docs-error"></div>
    <div id="docs-list">
      <div class="docs-empty">Loading…</div>
    </div>
  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────
  const state = { documentCount: 0, isLoading: false };

  // ── Init ───────────────────────────────────────────────────────────
  async function init() {
    await refreshHealth();
    const ta = document.getElementById('question-input');
    ta.addEventListener('input', function () {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 160) + 'px';
    });
  }

  async function refreshHealth() {
    try {
      const r = await fetch('/health');
      if (!r.ok) return;
      const d = await r.json();
      state.documentCount = d.total_documents ?? 0;
      updateDocBadge();
    } catch (_) {}
  }

  function updateDocBadge() {
    document.getElementById('doc-badge').textContent =
      state.documentCount + (state.documentCount === 1 ? ' doc' : ' docs');
  }

  // ── Query ───────────────────────────────────────────────────────────
  async function sendQuery() {
    const input = document.getElementById('question-input');
    const question = input.value.trim();
    if (!question || state.isLoading) return;

    state.isLoading = true;
    document.getElementById('send-btn').disabled = true;

    const es = document.getElementById('empty-state');
    if (es) es.remove();

    input.value = '';
    input.style.height = 'auto';

    appendUserMessage(question);
    const placeholder = appendLoadingMessage();

    try {
      const r = await fetch('/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question }),
      });
      const data = await r.json();
      placeholder.replaceWith(buildAssistantCard(data));
    } catch (_) {
      placeholder.replaceWith(buildAssistantCard({
        answer: 'Something went wrong. Please try again.',
        grounded: false, citations: [], hallucination: null,
      }));
    } finally {
      state.isLoading = false;
      document.getElementById('send-btn').disabled = false;
      scrollToBottom();
    }
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); }
  }

  // ── Message builders ────────────────────────────────────────────────
  function appendUserMessage(text) {
    const el = document.createElement('div');
    el.className = 'msg-user';
    el.textContent = text;
    document.getElementById('messages').appendChild(el);
    scrollToBottom();
    return el;
  }

  function appendLoadingMessage() {
    const card = document.createElement('div');
    card.className = 'msg-assistant';
    [100, 80, 55].forEach(w => {
      const sk = document.createElement('div');
      sk.className = 'skeleton';
      sk.style.width = w + '%';
      card.appendChild(sk);
    });
    document.getElementById('messages').appendChild(card);
    scrollToBottom();
    return card;
  }

  function buildAssistantCard(data) {
    const card = document.createElement('div');
    card.className = 'msg-assistant';

    const answerEl = document.createElement('div');
    answerEl.className = 'answer-text';
    answerEl.innerHTML = renderMarkdown(data.answer ?? '');
    card.appendChild(answerEl);

    const footer = document.createElement('div');
    footer.className = 'card-footer';

    const badge = document.createElement('span');
    badge.className = data.grounded ? 'badge-sourced' : 'badge-general';
    badge.textContent = data.grounded ? '● sourced' : '◌ general';
    footer.appendChild(badge);

    if (data.citations && data.citations.length > 0) {
      footer.appendChild(makeDot());
      footer.appendChild(buildCitationsToggle(data.citations));
    }
    if (data.grounded && data.hallucination) {
      footer.appendChild(makeDot());
      footer.appendChild(buildHallPill(data.hallucination));
    }
    card.appendChild(footer);

    if (data.citations && data.citations.length > 0) card.appendChild(buildCitationsBody(data.citations));
    if (data.grounded && data.hallucination) card.appendChild(buildHallBody(data.hallucination));

    setTimeout(() => wireToggles(card), 0);
    return card;
  }

  function makeDot() {
    const d = document.createElement('span');
    d.className = 'dot-sep';
    return d;
  }

  // ── Citations ────────────────────────────────────────────────────────
  function buildCitationsToggle(citations) {
    const t = document.createElement('span');
    t.className = 'citations-toggle';
    t.dataset.target = 'citations';
    t.innerHTML = citations.length + ' source' + (citations.length !== 1 ? 's' : '') + ' <span class="chevron">▾</span>';
    return t;
  }

  function buildCitationsBody(citations) {
    const body = document.createElement('div');
    body.className = 'citations-body';
    body.dataset.role = 'citations';
    for (const c of citations) {
      const item = document.createElement('div');
      item.className = 'citation-item';
      const idx = document.createElement('span');
      idx.className = 'citation-index';
      idx.textContent = '[' + c.index + ']';
      const meta = document.createElement('div');
      meta.className = 'citation-meta';
      const src = document.createElement('span');
      src.className = 'citation-source';
      src.textContent = c.source_file + (c.page_number ? '  ·  p.' + c.page_number : '');
      const score = document.createElement('span');
      score.className = 'citation-score';
      score.textContent = 'similarity ' + c.similarity_score.toFixed(3);
      const excerpt = document.createElement('span');
      excerpt.className = 'citation-excerpt';
      excerpt.textContent = c.excerpt;
      meta.append(src, score, excerpt);
      item.append(idx, meta);
      body.appendChild(item);
    }
    return body;
  }

  // ── Hallucination ─────────────────────────────────────────────────────
  function hallCls(s)   { return s >= 0.7 ? 'hall-consistent' : s >= 0.4 ? 'hall-check' : 'hall-flagged'; }
  function hallLabel(s) { return s >= 0.7 ? 'Consistent' : s >= 0.4 ? 'Check' : 'Flagged'; }

  function buildHallPill(h) {
    const pill = document.createElement('button');
    pill.className = 'hall-toggle ' + hallCls(h.overall_score);
    pill.dataset.target = 'hall';
    pill.innerHTML = hallLabel(h.overall_score) + ' ' + h.overall_score.toFixed(2) + ' <span class="chevron">▾</span>';
    return pill;
  }

  function buildHallBody(h) {
    const body = document.createElement('div');
    body.className = 'hall-body';
    body.dataset.role = 'hall';
    const inner = document.createElement('div');
    inner.className = 'hall-sentences';
    for (const ss of h.sentences) {
      const span = document.createElement('span');
      span.className = 'sent-span ' + (ss.score >= 0.7 ? 'sent-green' : ss.score >= 0.4 ? 'sent-yellow' : 'sent-red');
      span.title = 'Score: ' + ss.score.toFixed(2);
      span.textContent = ss.sentence + ' ';
      inner.appendChild(span);
    }
    body.appendChild(inner);
    return body;
  }

  function wireToggles(card) {
    card.querySelectorAll('[data-target]').forEach(toggle => {
      const body = card.querySelector('[data-role="' + toggle.dataset.target + '"]');
      if (!body) return;
      toggle.addEventListener('click', () => {
        const open = body.classList.toggle('open');
        toggle.classList.toggle('open', open);
      });
    });
  }

  // ── Markdown ──────────────────────────────────────────────────────────
  function renderMarkdown(raw) {
    let html = raw.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\[(\d+)\]/g, '<sup>[$1]</sup>');
    html = html.replace(/^[*\-] (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>.*<\/li>\n?)+/g, m => '<ul>' + m + '</ul>');
    html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
    return html.split(/\n{2,}/).map(p => {
      p = p.trim();
      if (!p) return '';
      if (/^<(h3|ul|ol|li)/.test(p)) return p;
      return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
    }).filter(Boolean).join('');
  }

  // ── Upload ─────────────────────────────────────────────────────────────
  async function uploadFiles(files) {
    if (!files || !files.length) return;
    setUploadStatus('Uploading…', '');
    document.getElementById('upload-actions').classList.add('hidden');

    const fd = new FormData();
    for (const f of files) fd.append('files', f);

    try {
      const r = await fetch('/ingest', { method: 'POST', body: fd });
      const d = await r.json();
      if (r.ok) {
        setUploadStatus('✓ ' + d.chunks_added + ' chunks added from ' + d.files_processed + ' file(s)', 'success');
        document.getElementById('drop-zone').style.display = 'none';
        document.getElementById('upload-actions').classList.remove('hidden');
        await refreshHealth();
      } else {
        setUploadStatus(d.detail ?? 'Upload failed.', 'error');
      }
    } catch (_) {
      setUploadStatus('Network error — is the server running?', 'error');
    }
  }

  function setUploadStatus(msg, cls) {
    const el = document.getElementById('upload-status');
    el.textContent = msg;
    el.className = cls;
  }

  // ── Upload modal ────────────────────────────────────────────────────────
  function openUploadModal() {
    resetUploadModal();
    document.getElementById('upload-modal').classList.add('open');
  }

  function closeUploadModal() {
    document.getElementById('upload-modal').classList.remove('open');
  }

  function resetUploadModal() {
    setUploadStatus('', '');
    document.getElementById('drop-zone').style.display = '';
    document.getElementById('upload-actions').classList.add('hidden');
    document.getElementById('file-input').value = '';
  }

  document.getElementById('upload-modal').addEventListener('click', function(e) {
    if (e.target === this) closeUploadModal();
  });

  function onDragOver(e)   { e.preventDefault(); document.getElementById('drop-zone').classList.add('drag-over'); }
  function onDragLeave()   { document.getElementById('drop-zone').classList.remove('drag-over'); }
  function onDrop(e)       { e.preventDefault(); document.getElementById('drop-zone').classList.remove('drag-over'); uploadFiles(e.dataTransfer.files); }
  function onFileSelect(e) { uploadFiles(e.target.files); e.target.value = ''; }

  // ── Documents modal ─────────────────────────────────────────────────────
  async function openDocsModal() {
    document.getElementById('docs-modal').classList.add('open');
    await loadDocuments();
  }

  function closeDocsModal() {
    document.getElementById('docs-modal').classList.remove('open');
  }

  document.getElementById('docs-modal').addEventListener('click', function(e) {
    if (e.target === this) closeDocsModal();
  });

  async function loadDocuments() {
    const list = document.getElementById('docs-list');
    const errEl = document.getElementById('docs-error');
    list.innerHTML = '<div class="docs-empty">Loading…</div>';
    errEl.textContent = '';

    try {
      const r = await fetch('/documents');
      const d = await r.json();
      if (!r.ok) { errEl.textContent = d.detail ?? 'Failed to load documents.'; return; }
      renderDocsList(d.documents);
    } catch (_) {
      errEl.textContent = 'Network error.';
    }
  }

  function renderDocsList(docs) {
    const list = document.getElementById('docs-list');
    if (!docs.length) {
      list.innerHTML = '<div class="docs-empty">No documents ingested yet.</div>';
      return;
    }

    list.innerHTML = '';
    for (const doc of docs) {
      const item = document.createElement('div');
      item.className = 'doc-item';
      item.dataset.docId = doc.document_id;

      const icon = document.createElement('div');
      icon.className = 'doc-icon';
      icon.textContent = '📄';

      const info = document.createElement('div');
      info.className = 'doc-info';

      const name = document.createElement('div');
      name.className = 'doc-name';
      name.textContent = doc.source_file;
      name.title = doc.source_file;

      const meta = document.createElement('div');
      meta.className = 'doc-meta';
      meta.textContent = doc.chunk_count + ' chunks · ' + doc.page_count + ' page' + (doc.page_count !== 1 ? 's' : '');

      info.append(name, meta);

      const delBtn = document.createElement('button');
      delBtn.className = 'doc-delete';
      delBtn.textContent = 'Delete';
      delBtn.onclick = () => deleteDocument(doc.document_id, doc.source_file, item, delBtn);

      item.append(icon, info, delBtn);
      list.appendChild(item);
    }
  }

  async function deleteDocument(docId, fileName, itemEl, btn) {
    if (!confirm('Delete "' + fileName + '"? This cannot be undone.')) return;

    btn.disabled = true;
    btn.textContent = 'Deleting…';

    const errEl = document.getElementById('docs-error');
    errEl.textContent = '';

    try {
      const r = await fetch('/documents/' + encodeURIComponent(docId), { method: 'DELETE' });
      const d = await r.json();
      if (r.ok) {
        itemEl.style.opacity = '0';
        itemEl.style.transition = 'opacity 200ms';
        setTimeout(() => {
          itemEl.remove();
          const list = document.getElementById('docs-list');
          if (!list.children.length) {
            list.innerHTML = '<div class="docs-empty">No documents ingested yet.</div>';
          }
        }, 200);
        await refreshHealth();
      } else {
        errEl.textContent = d.detail ?? 'Delete failed.';
        btn.disabled = false;
        btn.textContent = 'Delete';
      }
    } catch (_) {
      errEl.textContent = 'Network error.';
      btn.disabled = false;
      btn.textContent = 'Delete';
    }
  }

  // ── Utilities ─────────────────────────────────────────────────────────
  function scrollToBottom() {
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }

  init();
</script>
</body>
